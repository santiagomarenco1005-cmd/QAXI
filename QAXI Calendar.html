<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAXI Calendar</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Scripts: Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --panel: rgba(20, 20, 20, 0.8);
            --accent: #FFD700;
            --accent-glow: rgba(255, 215, 0, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }

        .brand {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .brand span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--glass);
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .status-dot.loading {
            background: #ffd700;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar / Calendar */
        .sidebar {
            width: 380px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            overflow-y: auto;
        }

        /* Agent Chat */
        .agent-dock {
            height: 350px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: sticky;
            bottom: 0;
        }

        @media (max-width: 900px) {
            header {
                padding: 0 20px;
            }
            .brand {
                font-size: 1.2rem;
            }
            .ai-status {
                display: none;
            }
            .main-layout {
                flex-direction: column;
                overflow-y: auto;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                overflow-y: visible;
            }
            .content {
                width: 100%;
                overflow-y: visible;
            }
            .events-view {
                padding: 20px;
            }
            .agent-dock {
                height: 400px;
                position: relative;
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
        }

        .msg.agent {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            color: #ddd;
        }

        .msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            padding: 5px 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .icon-btn:hover {
            color: var(--accent);
            background: var(--glass);
        }

        .icon-btn.active {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        /* Calendar Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 20px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .cal-day:hover {
            background: var(--glass);
            border-color: var(--border);
        }

        .cal-day.today {
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .cal-day.selected {
            background: var(--accent);
            color: #000;
            font-weight: 800;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Loader */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loading-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            color: var(--text-secondary);
        }

        /* Events Section */
        .events-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .event-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: 0.3s;
            position: relative;
        }

        .event-card:hover {
            border-color: var(--accent);
            background: rgba(255, 215, 0, 0.05);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
        }

        .event-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ff4444;
        }

        .event-time {
            font-family: 'Fira Code', monospace;
            color: var(--accent);
            font-weight: 700;
            min-width: 80px;
        }

        .event-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .event-info p { font-size: 0.85rem; color: var(--text-secondary); }

        .cta-btn {
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .cta-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent-glow); }

        .typing-indicator {
            display: inline-block;
            font-size: 0.8rem;
            color: var(--accent);
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <div class="loading-text">QAXI AI ENGINE LOADING</div>
        <div id="model-progress" style="width: 200px; height: 2px; background: #222; margin-top: 15px; position: relative; overflow: hidden;">
            <div id="progress-bar" style="position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s;"></div>
        </div>
    </div>

    <header>
        <a href="index.html" class="brand">QAXI<span>CALENDAR</span></a>
        <div class="ai-status">
            <div id="status-indicator" class="status-dot loading"></div>
            <span id="status-text">WEBNN LOCAL AI AGENT INITIALIZING...</span>
        </div>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="cal-header">
                <h2 id="current-month">Marzo 2025</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="icon-btn" id="prev-month-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="icon-btn" id="next-month-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="calendar-grid">
                <div class="weekday">Dom</div><div class="weekday">Lun</div><div class="weekday">Mar</div>
                <div class="weekday">Mie</div><div class="weekday">Jue</div><div class="weekday">Vie</div>
                <div class="weekday">Sab</div>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>

            <div style="margin-top: 40px; flex: 1; display: flex; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="font-size: 1.2rem; font-family: 'Cinzel', serif;">Notas</h2>
                    <button class="icon-btn" id="add-note-btn"><i class="fas fa-plus"></i></button>
                </div>
                <div id="notes-list" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>

        <div class="content">
            <div class="events-view">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h1 style="font-size: 2.5rem; font-family: 'Cinzel', serif;" id="view-title">Plan del Día</h1>
                    <button class="cta-btn" id="add-event-btn">+ Nuevo Evento</button>
                </div>
                <div id="events-container"></div>
            </div>

            <div class="agent-dock">
                <div class="chat-messages" id="chat-messages">
                    <div class="msg agent">
                        Hola, soy tu Asistente QAXI. Estoy aquí para ayudarte a organizar tu calendario y notas con IA profesional. ¿Qué planes tienes para hoy?
                    </div>
                </div>
                <div class="chat-input-area">
                    <button class="icon-btn" id="voice-btn" title="Comando de voz"><i class="fas fa-microphone"></i></button>
                    <input type="text" id="user-input" placeholder="Escribe un comando o usa la voz...">
                    <button class="icon-btn" id="send-btn" title="Enviar"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDbZAPtQioiXZzkiiIRrkrBkEPF440NMaE",
            authDomain: "qaxi-93d6d.firebaseapp.com",
            projectId: "qaxi-93d6d",
            storageBucket: "qaxi-93d6d.firebasestorage.app",
            messagingSenderId: "137240859996",
            appId: "1:137240859996:web:73e14d28c77233be965d99",
            measurementId: "G-C74Z1DWV54"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Global State
        let currentDate = new Date();
        let selectedDate = new Date();
        let aiModel = null;
        let events = [];
        let notes = [];

        // UI Selectors
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const progressBar = document.getElementById('progress-bar');
        const loaderOverlay = document.getElementById('loader-overlay');

        // Functions
        const addMessage = (text, side) => {
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        const speak = (text) => {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            window.speechSynthesis.speak(utterance);
        };

        const deleteEvent = async (id) => {
            if (!confirm('¿Eliminar este evento?')) return;
            if (auth.currentUser) {
                await db.collection('users').doc(auth.currentUser.uid).collection('calendar_events').doc(id).delete();
            } else {
                events = events.filter(e => e.id !== id);
                renderEvents();
            }
        };

        const deleteNote = async (id) => {
            if (!confirm('¿Eliminar esta nota?')) return;
            if (auth.currentUser) {
                await db.collection('users').doc(auth.currentUser.uid).collection('calendar_notes').doc(id).delete();
            } else {
                notes = notes.filter(n => n.id !== id);
                renderNotes();
            }
        };

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const renderEvents = () => {
            const container = document.getElementById('events-container');
            container.innerHTML = '';
            const dateStr = formatDate(selectedDate);
            const filtered = events.filter(e => e.date === dateStr);
            if (filtered.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">No hay eventos para este día.</p>';
                return;
            }
            filtered.sort((a,b) => a.time.localeCompare(b.time)).forEach(ev => {
                const div = document.createElement('div');
                div.className = 'event-card';
                div.innerHTML = `
                    <div class="event-time">${ev.time}</div>
                    <div class="event-info">
                        <h3>${ev.title}</h3>
                        <p>${ev.description}</p>
                    </div>
                    <button class="delete-btn" onclick="window.deleteEvent('${ev.id}')"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
        };

        const renderNotes = () => {
            const container = document.getElementById('notes-list');
            container.innerHTML = '';
            const dateStr = formatDate(selectedDate);
            const filteredNotes = notes.filter(n => {
                if (n.date) return n.date === dateStr;
                // Fallback for old notes without date
                return true;
            });

            if (filteredNotes.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); font-size: 0.8rem;">Sin notas para hoy.</p>';
                return;
            }

            filteredNotes.sort((a,b) => b.timestamp - a.timestamp).forEach(note => {
                const div = document.createElement('div');
                div.className = 'event-card';
                div.style.padding = '12px'; div.style.marginBottom = '0'; div.style.cursor = 'pointer';
                div.innerHTML = `
                    <div class="event-info">
                        <h3>${note.title}</h3>
                        <p>${note.content.substring(0, 40)}${note.content.length > 40 ? '...' : ''}</p>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); window.deleteNote('${note.id}')"><i class="fas fa-trash"></i></button>
                `;
                div.onclick = () => alert(`TITULO: ${note.title}\n\n${note.content}`);
                container.appendChild(div);
            });
        };

        window.deleteEvent = deleteEvent;
        window.deleteNote = deleteNote;

        const renderCalendar = () => {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('current-month').innerText = `${monthNames[month]} ${year}`;
            const calDays = document.getElementById('calendar-days');
            calDays.innerHTML = '';
            for(let i=0; i<firstDay; i++) calDays.innerHTML += '<div class="cal-day"></div>';
            const today = new Date();
            for(let d=1; d<=daysInMonth; d++) {
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isSelected = selectedDate.getDate() === d && selectedDate.getMonth() === month && selectedDate.getFullYear() === year;
                const dayEl = document.createElement('div');
                dayEl.className = `cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => {
                    selectedDate = new Date(year, month, d);
                    document.getElementById('view-title').innerText = `Plan del ${d} de ${monthNames[month]} ${year}`;
                    renderCalendar(); renderEvents();
                };
                calDays.appendChild(dayEl);
            }
        };

        const loadData = async () => {
            if (!auth.currentUser) return;
            const uid = auth.currentUser.uid;
            db.collection('users').doc(uid).collection('calendar_events').onSnapshot(snap => {
                events = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderEvents();
            });
            db.collection('users').doc(uid).collection('calendar_notes').onSnapshot(snap => {
                notes = snap.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
                renderNotes();
            });
        };

        const processCommand = async (text) => {
            if (!aiModel) return "El motor de IA aún se está cargando...";

            const dateStr = selectedDate.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Contextual help
            if (text.toLowerCase().includes('que tengo') || text.toLowerCase().includes('mi agenda')) {
                const dayEvents = events.filter(e => e.date === formatDate(selectedDate));
                if (dayEvents.length === 0) return `Para el ${dateStr} no tienes eventos programados.`;
                return `Para el ${dateStr} tienes: ${dayEvents.map(e => e.title + ' a las ' + e.time).join(', ')}.`;
            }

            // Professional greeting handling
            const lowerText = text.toLowerCase();
            if (lowerText.includes('hola') || lowerText.includes('buenos días') || lowerText.includes('buenas tardes')) {
                return "¡Hola! Soy tu Asistente QAXI. ¿Cómo puedo ayudarte con tu agenda hoy?";
            }

            const candidate_labels = ['schedule event', 'create note', 'search', 'automation', 'greeting', 'status check'];
            try {
                const output = await aiModel(text, candidate_labels);
                const intent = output.labels[0];
                const confidence = output.scores[0];
                console.log(`[WebNN] Intent: ${intent} (${Math.round(confidence*100)}%)`);

                if (intent === 'schedule event' && confidence > 0.4) {
                    const timeMatch = text.match(/(\d{1,2}:\d{2})|(\d{1,2}\s*(?:pm|am|p\.m\.|a\.m\.))/i);
                    let time = timeMatch ? timeMatch[0] : "12:00";

                    if (time.toLowerCase().includes('pm') && !time.includes(':')) {
                        let hour = parseInt(time);
                        if (hour < 12) time = (hour + 12) + ":00";
                    }

                    const titleMatch = text.match(/(?:reunión|cita|evento|clase|quedar|anota|agenda)\s+(?:con\s+)?(?:para\s+)?([^a-z0-9\s][^.]+|[a-z0-9\s]{3,})/i);
                    let title = titleMatch ? titleMatch[1].trim() : "Nuevo Evento AI";

                    let dateObj = new Date(selectedDate);
                    if (text.toLowerCase().includes('mañana')) {
                        dateObj.setDate(dateObj.getDate() + 1);
                    }

                    const dateStr = formatDate(dateObj);

                    // Recurring event detection (Basic)
                    const isRecurring = text.toLowerCase().includes('cada') || text.toLowerCase().includes('todos los');
                    let recurrence = isRecurring ? 'Weekly' : 'None';

                    const event = {
                        title,
                        description: `Agendado por QAXI AI (Local). ${isRecurring ? 'Evento recurrente.' : ''}`,
                        time,
                        date: dateStr,
                        recurrence
                    };

                    if (auth.currentUser) {
                        await db.collection('users').doc(auth.currentUser.uid).collection('calendar_events').add(event);
                    } else {
                        events.push({ id: Date.now().toString(), ...event });
                        renderEvents();
                    }
                    return `Entendido. He agendado "${title}" para las ${time}${text.toLowerCase().includes('mañana') ? ' de mañana' : ''}. ${isRecurring ? 'Lo he marcado como recurrente.' : ''}`;
                }

                if (intent === 'create note' && confidence > 0.4) {
                    const topics = ['trabajo', 'personal', 'ideas', 'compras', 'finanzas', 'salud'];
                    const topicOutput = await aiModel(text, topics);
                    const mainTopic = topicOutput.labels[0].toUpperCase();

                    const titleMatch = text.match(/(?:nota|escribe|recuerda)\s+(?:que\s+)?([^a-z0-9\s][^.]+|[a-z0-9\s]{3,})/i);
                    let title = titleMatch ? titleMatch[1].trim().substring(0, 30) : "Nota de AI";
                    title = `[${mainTopic}] ${title}`;

                    const dateStr = formatDate(selectedDate);
                    const note = { title, content: text, date: dateStr, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
                    if (auth.currentUser) {
                        await db.collection('users').doc(auth.currentUser.uid).collection('calendar_notes').add(note);
                    } else {
                        notes.push({ id: Date.now().toString(), ...note, timestamp: new Date() });
                        renderNotes();
                    }
                    return `He procesado y guardado tu nota bajo la categoría ${mainTopic}: "${title}".`;
                }

                if (intent === 'automation') return "Detecto un comando de automatización. ¿Deseas que genere un script de Python o JS para manejar tu calendario?";
                if (intent === 'greeting') return "¡Hola! Soy tu asistente QAXI. Estoy listo para organizar tu día usando WebNN.";
                if (intent === 'status check') return `Actualmente tienes ${events.length} eventos y ${notes.length} notas guardadas.`;

                return "He recibido tu mensaje. ¿Quieres que agende un evento o guarde una nota?";
            } catch (err) {
                console.error(err);
                return "Error al procesar con el motor WebNN local.";
            }
        };

        const sendMessage = async () => {
            const text = userInput.value.trim();
            if(!text) return;
            addMessage(text, 'user');
            userInput.value = '';

            // Limit message history display
            while (chatMessages.children.length > 20) {
                chatMessages.removeChild(chatMessages.firstChild);
            }

            const indicator = document.createElement('span');
            indicator.className = 'typing-indicator';
            indicator.innerText = 'procesando...';
            chatMessages.lastChild.appendChild(indicator);
            const response = await processCommand(text);
            indicator.remove();
            addMessage(response, 'agent');
            speak(response);
            console.log(`[Agent] Action triggered: ${text.substring(0,20)}...`);
        };

        // Event Listeners
        document.getElementById('send-btn').onclick = sendMessage;
        userInput.onkeydown = (e) => { if(e.key==='Enter') sendMessage(); };
        document.getElementById('prev-month-btn').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('next-month-btn').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };

        document.getElementById('add-event-btn').onclick = async () => {
            const title = prompt("Título:");
            const time = prompt("Hora (HH:mm):", "12:00");
            if (title && time) {
                const event = { title, description: "", time, date: formatDate(selectedDate) };
                if (auth.currentUser) await db.collection('users').doc(auth.currentUser.uid).collection('calendar_events').add(event);
                else { events.push({ id: Date.now().toString(), ...event }); renderEvents(); }
            }
        };

        document.getElementById('add-note-btn').onclick = async () => {
            const title = prompt("Título:");
            const content = prompt("Contenido:");
            if (title && content) {
                const dateStr = formatDate(selectedDate);
                const note = { title, content, date: dateStr, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
                if (auth.currentUser) await db.collection('users').doc(auth.currentUser.uid).collection('calendar_notes').add(note);
                else { notes.push({ id: Date.now().toString(), ...note, timestamp: new Date() }); renderNotes(); }
            }
        };

        // Init
        auth.onAuthStateChanged(user => {
            if (user) { loadData(); console.log(`[Auth] User logged in: ${user.email}`); }
            else console.log(`[Auth] No active session.`);
        });

        const init = async () => {
            try {
                env.allowLocalModels = false;
                // Force WebGPU/WebNN if available
                env.backends.onnx.wasm.proxy = true;

                statusText.innerText = 'LOADING AI MODEL (MOBILEBERT)...';
                aiModel = await pipeline('zero-shot-classification', 'Xenova/mobilebert-uncased-mnli', {
                    device: 'webgpu', // Prefer WebGPU
                    progress_callback: (p) => { if (p.status === 'progress') progressBar.style.width = p.progress + '%'; }
                });

                statusIndicator.classList.remove('loading');
                statusText.innerText = 'WEBNN LOCAL AI AGENT ACTIVE';
                console.log('[WebNN] AI Model loaded via WebGPU/WebNN.');

                loaderOverlay.style.opacity = '0';
                setTimeout(() => loaderOverlay.style.display = 'none', 500);
                renderCalendar();
                renderEvents();
                renderNotes();
            } catch (err) {
                console.error(err);
                loaderOverlay.innerHTML = `<div style="color: red;">Error: ${err.message}</div>`;
            }
        };

        init();

        // Voice
        let isListening = false;
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'es-ES';
            recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; sendMessage(); toggleVoice(); };
            recognition.onerror = () => toggleVoice();
        }
        const toggleVoice = () => {
            const btn = document.getElementById('voice-btn');
            if (!recognition) return alert("No soportado");
            isListening = !isListening;
            if (isListening) { btn.classList.add('active'); btn.innerHTML = '<i class="fas fa-stop"></i>'; recognition.start(); }
            else { btn.classList.remove('active'); btn.innerHTML = '<i class="fas fa-microphone"></i>'; recognition.stop(); }
        };
        document.getElementById('voice-btn').onclick = toggleVoice;

    </script>
</body>
</html>
