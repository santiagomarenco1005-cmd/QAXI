<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFix - Herramientas PDF Avanzadas</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='45' r='32' fill='none' stroke='%23DC2626' stroke-width='8'/%3E%3Cline x1='65' y1='65' x2='82' y2='82' stroke='%23DC2626' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234567890123456"
    crossorigin="anonymous"></script>
  <!-- Librerías con versiones fijas y SRI REAL validado (2025-2026 Core Stack) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
    integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"
    integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" crossorigin="anonymous"></script>

  <!-- QPDF WASM Engine (Core para Cifrado Real) -->
  <script src="https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.min.js"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --red: #FF3366;
      --red-dark: #cc2952;
      --red-darker: #991f3d;
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --surface2: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.95);
      --text2: rgba(255, 255, 255, 0.6);
      --text3: rgba(255, 255, 255, 0.4);
      --text4: rgba(255, 255, 255, 0.5);
      --red-glow: rgba(255, 51, 102, 0.4);
      --red-bg: rgba(255, 51, 102, 0.1);
      --red-bg2: rgba(255, 51, 102, 0.05);
      --red-bg3: rgba(255, 51, 102, 0.15);
      --gradient-brand: linear-gradient(135deg, #FF3366, #FF6B35);
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2)
    }

    /* Animated BG */
    .bg-glow {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0
    }

    .bg-glow .g1 {
      position: absolute;
      top: -25%;
      right: -25%;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.06) 0%, transparent 70%);
      animation: pulse1 8s ease-in-out infinite
    }

    .bg-glow .g2 {
      position: absolute;
      bottom: -25%;
      left: -25%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.04) 0%, transparent 70%);
      animation: pulse2 10s ease-in-out infinite
    }

    @keyframes pulse1 {

      0%,
      100% {
        transform: scale(1);
        opacity: .5
      }

      50% {
        transform: scale(1.1);
        opacity: 1
      }
    }

    @keyframes pulse2 {

      0%,
      100% {
        transform: scale(1.1);
        opacity: 1
      }

      50% {
        transform: scale(1);
        opacity: .5
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(32px);
        filter: blur(4px)
      }
      60% {
        opacity: 1;
        filter: blur(0)
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0)
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.92);
        filter: blur(2px)
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes shimmer {
      0% { background-position: -200% center }
      100% { background-position: 200% center }
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0) }
      50% { transform: translateY(-5px) }
    }

    @keyframes cardGlow {
      0% { box-shadow: 0 4px 20px rgba(0,0,0,0.3) }
      100% { box-shadow: 0 16px 48px rgba(255,51,102,0.18), 0 4px 20px rgba(0,0,0,0.3) }
    }

    .fade-up {
      animation: fadeUp .7s cubic-bezier(0.16, 1, 0.3, 1) forwards
    }

    .scale-in {
      animation: scaleIn .45s cubic-bezier(0.16, 1, 0.3, 1) forwards
    }

    .float-icon {
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .dropzone:hover .dropzone-icon {
      transform: translateY(-8px) scale(1.05);
      background: var(--red);
    }

    .dropzone:hover .dropzone-icon svg {
      color: #fff;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(5, 5, 5, 0.75);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: translateY(-1px);
    }

    .logo-img {
      height: 48px;
      object-fit: contain;
      transition: all 0.3s ease;
    }

    .logo:hover .logo-img {
      transform: scale(1.05);
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.04em;
      color: var(--text);
      display: flex;
      align-items: center;
    }

    .logo-text .fix {
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px
    }

    .badge-incognito {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--red-bg);
      display: none
    }

    .badge-incognito.active {
      display: flex
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse1 2s ease-in-out infinite
    }

    .badge-incognito span {
      font-size: 12px;
      font-weight: 600;
      color: var(--red)
    }

    .by-qaxi {
      font-size: 12px;
      color: var(--text3);
      font-family: 'Space Mono', monospace
    }


    .menu-btn {
      display: none;
      padding: 8px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer
    }

    .menu-btn svg {
      width: 24px;
      height: 24px
    }

    /* Main */
    main {
      position: relative;
      z-index: 10;
      padding-top: clamp(72px, 8.5vh, 100px);
      min-height: 100vh
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px
    }

    .tool-container {
      max-width: 768px;
      margin: 0 auto;
      padding: 0 24px
    }

    .logo-sticker {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 4px;
    }

    .logo-sticker svg {
      width: 100%;
      height: 100%;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: clamp(64px, 8vh, 96px) 0 48px;
      position: relative;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.1;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.05em;
      margin-bottom: 24px;
      color: #fff;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(to right, #fff, var(--red));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 51, 102, 0.2);
    }

    .hero p {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.6;
      color: var(--text2);
      font-weight: 400;
    }

    /* Category */
    .category {
      margin-bottom: 64px
    }

    .reality-panel {
      margin-bottom: 36px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--border2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
    }

    .reality-panel h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .reality-panel p {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text3);
      margin-bottom: 14px;
      max-width: 920px;
    }

    .reality-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .reality-card {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      padding: 14px;
    }

    .reality-card .title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fca5a5;
      margin-bottom: 8px;
    }

    .reality-card .body {
      font-size: 12px;
      line-height: 1.55;
      color: var(--text2);
    }

    .category-header {
      margin-bottom: 32px
    }

    .category-header h2 {
      font-size: clamp(1.5rem, 3vw, 1.875rem);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text)
    }

    .category-header p {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text3)
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px
    }

    #toolCategories {
      margin-top: 34px;
    }

    /* Tool Card */
    .tool-card {
      text-align: left;
      padding: 24px;
      border-radius: 16px;
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .35s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color .35s ease,
                  background .35s ease,
                  box-shadow .35s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .tool-card:hover::before {
      opacity: 1;
      animation: shimmer 1.2s linear infinite;
    }

    .tool-card:hover {
      transform: translateY(-6px) scale(1.025);
      border-color: rgba(255, 51, 102, 0.45);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 20px 50px rgba(255, 51, 102, 0.15), 0 4px 20px rgba(0,0,0,0.3);
    }

    .tool-card:active {
      transform: translateY(-2px) scale(1.01);
      transition-duration: .1s;
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1), background .3s, box-shadow .3s
    }

    .tool-card:hover .tool-icon {
      animation: floatIcon 1.8s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .tool-icon svg {
      width: 24px;
      height: 24px
    }

    .tool-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
      transition: color .3s
    }

    .tool-card:hover h3 {
      color: #fff
    }

    .tool-card .desc {
      font-size: 12px;
      line-height: 1.55;
      color: var(--text4);
      transition: color .3s
    }

    .tool-card:hover .desc {
      color: rgba(255,255,255,0.55)
    }

    .tool-card .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 2px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-chip.stable {
      color: #86efac;
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.28);
    }

    .status-chip.partial {
      color: #fcd34d;
      background: rgba(245, 158, 11, 0.12);
      border-color: rgba(245, 158, 11, 0.28);
    }

    .status-chip.limited {
      color: #fca5a5;
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.28);
    }

    .tool-card .cta {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .3s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1);
      font-size: 12px;
      font-weight: 600
    }

    .tool-card:hover .cta {
      opacity: 1;
      transform: translateX(0)
    }

    /* Tool View */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      padding: 0;
      transition: color .2s
    }

    .back-btn:hover {
      color: #fff
    }

    .back-btn svg {
      width: 20px;
      height: 20px
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px
    }

    .tool-header .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .tool-header .icon svg {
      width: 36px;
      height: 36px;
    }

    .tool-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
      color: #fff;
    }

    .tool-header .desc {
      font-size: 15px;
      color: var(--text4);
      font-weight: 500;
    }

    .tool-header .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tool-header .status-note {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
      max-width: 720px;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Enhanced Dropzone */
    .dropzone {
      border: 2px dashed var(--border2);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
    }

    .dropzone:hover,
    .dropzone.dragging {
      background: rgba(255, 51, 102, 0.05);
      border-color: var(--red);
      transform: scale(1.01);
    }

    .dropzone-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropzone-icon svg {
      width: 24px;
      height: 24px;
      color: var(--red)
    }

    .dropzone h4 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text)
    }

    .dropzone p {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text4)
    }

    .dropzone input {
      display: none
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      color: #fff;
      background: var(--gradient-brand);
      font-family: inherit;
      transition: all .3s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 32px var(--red-bg3);
    }

    .btn-primary:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px var(--red-glow);
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      filter: grayscale(0.5);
    }

    .btn-primary svg {
      width: 20px;
      height: 20px
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05)
    }

    /* Toggle Bar */
    .toggle-bar {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 16px;
      background: var(--surface2)
    }

    .toggle-bar button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      background: transparent;
      color: var(--text2)
    }

    .toggle-bar button.active {
      background: var(--red);
      color: #fff
    }

    /* File List */
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface2)
    }

    .file-item+.file-item {
      margin-top: 8px
    }

    .file-item .file-icon svg {
      width: 32px;
      height: 32px;
      color: var(--red)
    }

    .file-item .file-info {
      flex: 1;
      min-width: 0
    }

    .file-item .file-name {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .file-item .file-size {
      font-size: 12px;
      color: var(--text4)
    }

    .file-item .file-idx {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--red-bg3);
      color: var(--red)
    }

    .file-item .btn-icon {
      padding: 4px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      transition: all .2s
    }

    .file-item .btn-icon:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--red)
    }

    /* Format Pills */
    .format-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .format-pill {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .format-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff
    }

    /* Quality Cards */
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px
    }

    .quality-card {
      padding: 16px;
      border-radius: 12px;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all .2s
    }

    .quality-card.active {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .quality-card .q-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text2)
    }

    .quality-card.active .q-label {
      color: var(--red)
    }

    .quality-card .q-desc {
      font-size: 12px;
      margin-top: 4px;
      color: var(--text4)
    }

    .quality-card .q-pct {
      font-size: 24px;
      font-weight: 700;
      margin-top: 8px;
      color: var(--text3)
    }

    .quality-card.active .q-pct {
      color: var(--red)
    }

    /* Result Box */
    .result-box {
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      background: var(--red-bg2);
      border: 1px solid var(--red-bg3)
    }

    .result-box .label {
      font-size: 14px;
      color: var(--text2)
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 12px
    }

    .result-row .val {
      font-size: 28px;
      font-weight: 700
    }

    .result-row .val.old {
      color: var(--text3)
    }

    .result-row .val.new {
      color: var(--red)
    }

    .result-row .sub {
      font-size: 12px;
      color: var(--text4)
    }

    .category-header h2 {
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .category-header p {
      font-size: 15px;
      color: var(--text4);
      font-weight: 500;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px
    }

    .tool-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tool-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .tool-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255, 51, 102, 0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .tool-card:hover::after {
      opacity: 1;
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      transition: all 0.4s;
      flex-shrink: 0;
    }

    .tool-card:hover .tool-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .tool-icon svg {
      width: 28px;
      height: 28px
    }

    /* Page Grid */
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px
    }

    .page-thumb {
      position: relative;
      padding: 8px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: grab;
      transition: all .2s
    }

    .page-thumb:active {
      cursor: grabbing
    }

    .page-thumb.dragging {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .page-thumb .page-inner {
      aspect-ratio: 3/4;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      transition: transform .3s
    }

    .page-thumb .page-num {
      font-size: 32px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.15)
    }

    .page-thumb .page-label {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      color: var(--text2)
    }

    .page-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s
    }

    .page-thumb:hover .page-actions {
      opacity: 1
    }

    .page-actions button {
      padding: 4px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .page-actions button svg {
      width: 16px;
      height: 16px
    }

    .page-actions button.del {
      color: var(--red)
    }

    /* Editor */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border)
    }

    .editor-toolbar button {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .editor-toolbar button:hover {
      background: rgba(255, 255, 255, 0.05)
    }

    .editor-canvas {
      border-radius: 16px;
      padding: 32px;
      min-height: 400px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5)
    }

    .editor-canvas textarea,
    .editor-canvas [contenteditable] {
      width: 100%;
      min-height: 350px;
      resize: none;
      outline: none;
      border: none;
      background: transparent;
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a
    }

    /* Signature */
    .sig-canvas-wrap {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1)
    }

    .sig-canvas {
      width: 100%;
      height: 200px;
      cursor: crosshair;
      touch-action: none;
      display: block
    }

    .sig-typed {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 24px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Brush Script MT', cursive
    }

    .sig-preview {
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      background: rgba(255, 255, 255, 0.95)
    }

    .sig-preview p {
      font-size: 40px;
      color: var(--red);
      font-family: 'Brush Script MT', cursive
    }

    /* Protect */
    .form-group {
      margin-bottom: 16px
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 8px
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border2);
      font-family: inherit
    }

    .form-input::placeholder {
      color: var(--text4)
    }

    .permissions {
      padding: 16px;
      border-radius: 12px;
      background: var(--surface)
    }

    .perm-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 4px 0
    }

    .perm-row+.perm-row {
      margin-top: 12px
    }

    .perm-check {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0
    }

    .perm-check.on {
      background: var(--red)
    }

    .perm-check.off {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2)
    }

    .perm-check svg {
      width: 14px;
      height: 14px;
      color: #fff
    }

    .perm-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7)
    }

    /* Watermark */
    .wm-options {
      display: flex;
      gap: 12px
    }

    .wm-opt {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2)
    }

    .wm-opt.active {
      border-color: var(--red);
      background: var(--red-bg);
      color: var(--red)
    }

    .wm-preview {
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      min-height: 300px
    }

    .wm-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .3s
    }

    .wm-overlay.text-wm {
      font-size: 48px;
      font-weight: 700;
      transform: rotate(-45deg);
      color: rgba(220, 38, 38, 0.5)
    }

    .wm-overlay.logo-wm svg {
      width: 128px;
      height: 128px;
      color: rgba(220, 38, 38, 0.5)
    }

    .wm-lines {
      position: relative;
      z-index: 1
    }

    .wm-line {
      height: 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.08);
      margin-bottom: 12px
    }

    .opacity-slider {
      width: 100%;
      accent-color: var(--red);
      appearance: none;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none
    }

    .opacity-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px
    }

    .slider-header span {
      font-size: 14px;
      color: var(--text2)
    }

    .slider-header .val {
      font-family: 'Space Mono', monospace;
      color: var(--red)
    }
    /* Privacy */
    .privacy-box {
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      background: var(--red-bg2);
      border: 1px solid var(--red-bg)
    }

    .privacy-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      background: var(--red-bg)
    }

    .privacy-icon svg {
      width: 24px;
      height: 24px;
      color: var(--red)
    }

    .privacy-box h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text)
    }

    .privacy-box>p {
      font-size: 14px;
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto;
      color: var(--text2)
    }

    .privacy-features {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center
    }

    .privacy-feat {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .privacy-feat .feat-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(220, 38, 38, 0.2);
      flex-shrink: 0
    }

    .privacy-feat .feat-dot svg {
      width: 12px;
      height: 12px;
      color: var(--red)
    }

    .privacy-feat span {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7)
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid var(--border2);
      padding: 14px 24px;
      border-radius: 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      animation: toastIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .toast.success {
      border-color: rgba(16, 185, 129, 0.4);
    }

    .toast.error {
      border-color: rgba(239, 68, 68, 0.4);
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .toast.closing {
      animation: toastOut 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    /* Privacy Timer */
    .privacy-timer {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1200;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(12, 12, 12, 0.92);
      border: 1px solid rgba(220, 38, 38, 0.22);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }

    .privacy-timer.active {
      display: flex;
    }

    .timer-ring {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .timer-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-label {
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--text4);
      text-transform: uppercase;
      line-height: 1.1;
    }

    .timer-val {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--red);
      margin-top: 2px;
      line-height: 1;
    }

    .sig-obj {
      position: absolute;
      cursor: move;
      z-index: 100;
      border: 2px dashed transparent;
      border-radius: 8px;
      transition: border-color 0.2s;
    }

    .sig-obj:hover {
      border-color: rgba(255, 51, 102, 0.5);
    }

    .sig-obj.dragging {
      border-color: var(--red);
    }

    .sig-obj img {
      display: block;
      max-width: 100%;
      height: auto;
      pointer-events: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block
    }

    /* Footer */
    .footer {
      margin-top: 96px;
      padding: 32px 0;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05)
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px
    }

    .footer-logo svg {
      width: 20px;
      height: 20px;
      color: rgba(255, 255, 255, 0.2)
    }

    .footer-logo span {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      font-family: 'Space Mono', monospace
    }

    .footer p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.15)
    }

    /* Section spacing */
    .space-y>*+* {
      margin-top: 32px
    }

    .space-y-sm>*+* {
      margin-top: 16px
    }

    .mt-sm {
      margin-top: 12px
    }

    .mt-md {
      margin-top: 24px
    }

    .hidden {
      display: none !important
    }

    .tool-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .tool-content-side {
      flex: 1;
      min-width: 300px;
    }

    .tool-ad-side {
      width: 300px;
      flex-shrink: 0;
      position: sticky;
      top: 100px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
    }

    @media (max-width: 900px) {
      .tool-ad-side {
        display: none;
      }
    }

    /* Mobile */
    .mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(10, 10, 10, 0.98);
      padding: 80px 24px 24px;
      display: none;
      overflow-y: auto
    }

    .mobile-menu.open {
      display: block
    }

    .mobile-menu .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer
    }

    .mobile-menu .close-btn svg {
      width: 24px;
      height: 24px
    }

    .mobile-menu button.tool-link {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px
    }

    .mobile-menu button.tool-link:hover {
      background: var(--red-bg)
    }

    .mobile-menu button.tool-link svg {
      width: 20px;
      height: 20px
    }

    @media(max-width:768px) {
      .menu-btn {
        display: block
      }

      .header-right .by-qaxi {
        display: none
      }

      .hero {
        padding: 64px 0 40px
      }

      .quality-grid {
        grid-template-columns: 1fr
      }

      .tools-grid {
        grid-template-columns: 1fr 1fr
      }

      .wm-options {
        flex-direction: column
      }
    }

    @media(max-width:480px) {
      .tools-grid {
        grid-template-columns: 1fr
      }

      .privacy-timer {
        right: 12px;
        bottom: 12px;
        padding: 10px 12px;
      }

      .page-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow">
    <div class="g1"></div>
    <div class="g2"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" onclick="showHome()">
        <img src="pdfix.png" alt="PDFix Logo" class="logo-img">
        <span class="logo-text">PD<span class="fix">Fix</span></span>
      </a>
      <div class="header-right">
        <div class="badge-incognito" id="headerBadge">
          <div class="badge-dot"></div><span>Incógnito</span>
        </div>
        <button class="menu-btn" onclick="toggleMobileMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" onclick="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <div id="mobileMenuTools"></div>
  </div>

  <!-- Main -->
  <main>
    <!-- Home -->
    <div id="homeView">
      <div class="container">
        <div id="toolCategories"></div>

        <!-- Google Ads (Home) -->
        <div style="text-align: center; margin: 1.25rem 0 2rem;">
          <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456"
            data-ad-slot="9876543210" data-ad-format="auto" data-full-width-responsive="true"></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </div>
        <footer class="footer">
          <div class="footer-logo">
            <span>PDFix Technologies</span>
          </div>
          <p>V1.0.0</p>
        </footer>
      </div>
    </div>

    <!-- Tool View -->
    <div id="toolView" class="hidden">
      <div class="tool-layout">
        <div class="tool-content-side">

    // ─── Logo Processing (True Transparency) ───
    window._transparentLogo = null;
    async function getTransparentLogo() {
      if (window._transparentLogo) return window._transparentLogo;
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = 'pdfix.png';
        img.onload = () => {
          const cv = document.createElement('canvas');
          cv.width = img.width; cv.height = img.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const iData = ctx.getImageData(0, 0, cv.width, cv.height);
          const d = iData.data;
          for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i + 1], b = d[i + 2];
            // The checkerboard consists of white (255) and light grey (~204).
            // Both are neutral (R~G~B) and bright.
            const saturation = Math.max(r, g, b) - Math.min(r, g, b);
            const brightness = (r + g + b) / 3;
            // If it's neutral (low saturation) and relatively bright, it's background
            if (saturation < 50 && brightness > 120) {
              d[i + 3] = 0; // Make transparent
            }
          }
          ctx.putImageData(iData, 0, 0);
          window._transparentLogo = cv.toDataURL('image/png');
          resolve(window._transparentLogo);
        };
        img.onerror = () => resolve('pdfix.png'); // Fallback
      });
    }

      const pages = doc.getPages();

      // Logo embedding is optional — never blocks the text watermark
      let logoImg = null;
      let logoW = 0, logoH = 0;
      try {
        const logoDataURL = window._transparentLogo || await getTransparentLogo();
        logoImg = await doc.embedPng(logoDataURL);
        const scaled = logoImg.scale(0.08);
        logoW = scaled.width;
        logoH = scaled.height;
      } catch (e) {
        console.warn("Logo embed skipped:", e);
      }

      // Text watermarks always run
      for (const page of pages) {
        const { width, height } = page.getSize();
        try {
          if (logoImg) {
            page.drawImage(logoImg, { x: 20, y: 15, width: logoW, height: logoH, opacity: 0.4 });

          page.drawText('Exportado desde PDFix', {
            x: logoImg ? 20 + logoW + 8 : 20,

            opacity: 0.45,

    // ─── Helpers ───
    const PDF_JS_VERSION = '3.11.174';
    const QPDF_CDN_BASE = 'https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist';
    const DEFAULT_MAX_FILE_SIZE = 500 * 1024 * 1024;
    const HEAVY_MAX_FILE_SIZE = 500 * 1024 * 1024;
    function el(id) { return document.getElementById(id); }
    function bytesToMB(bytes) { return (bytes / (1024 * 1024)).toFixed(0); }
    async function initPdfJs() {
      const pdfjs = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
      if (!pdfjs || typeof pdfjs.getDocument !== 'function') {
        throw new Error('PDF.js no está disponible.');
      }
      const workerUrl = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDF_JS_VERSION}/pdf.worker.min.js`;
      if (pdfjs.GlobalWorkerOptions && pdfjs.GlobalWorkerOptions.workerSrc !== workerUrl) {
        pdfjs.GlobalWorkerOptions.workerSrc = workerUrl;
      }
      return pdfjs;
    }
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === '1') { resolve(); return; }
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('No se pudo cargar script externo.')), { once: true });
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.crossOrigin = 'anonymous';
        script.onload = () => { script.dataset.loaded = '1'; resolve(); };
        script.onerror = () => reject(new Error('No se pudo cargar script externo.'));
        document.head.appendChild(script);
      });
    }
    function getToolSizeLimit(toolId) {
      const heavyTools = new Set(['compress', 'compare', 'advanced', 'sign']);
      return heavyTools.has(toolId) ? HEAVY_MAX_FILE_SIZE : DEFAULT_MAX_FILE_SIZE;
    }
    async function initQpdfModule() {
      if (window._qpdfModule) return window._qpdfModule;

      const ensureFactory = async () => {
        if (typeof window.Module === 'function') return window.Module;
        await loadScript(`${QPDF_CDN_BASE}/qpdf.min.js`);
        if (typeof window.Module !== 'function') {
          throw new Error('No se encontró la fábrica WASM de QPDF.');
        }
        return window.Module;
      };

      const factory = await ensureFactory();
      const moduleInstance = await factory({
        locateFile: (path) => `${QPDF_CDN_BASE}/${path}`
      });
      if (!moduleInstance || !moduleInstance.FS || typeof moduleInstance.callMain !== 'function') {
        throw new Error('QPDF WASM no inicializó correctamente.');
      }
      window._qpdfModule = moduleInstance;
      return moduleInstance;
    }

    // ─── File Handling ───
    function filterType(files, tool) {
      if (tool === 'createpdf' || tool === 'advanced') {
        // Allow images, texts, etc for tools that accept them
        return files;
      }
      return files.filter(f => f.name.toLowerCase().endsWith('.pdf') || f.type === 'application/pdf');
    }

    function handleDrop(zoneId, e) {
      if (zoneId === 'sigUpDrop') return;
      const filesArr = Array.from(e.dataTransfer.files);

      const validFiles = filterType(filesArr, state.activeTool);
      if (validFiles.length === 0) {
        showToast("Extensión de archivo no válida para esta herramienta", "error");
        return;
      }
      if (validFiles.length < filesArr.length) {
        showToast("Algunos archivos fueron omitidos por no ser PDF", "info");
      }
      state.files = [...state.files, ...validFiles];
      if (state.activeTool === 'compare') window._compareState = null;
      if (state.activeTool === 'metadata') window._metadataDraft = null;
      showToast(`${validFiles.length} archivo(s) añadidos`, "success");
      renderTool(state.activeTool);
    }
    function handleFileInput(zoneId, input) {
      if (zoneId === 'sigUpDrop') {
        state.files = [...state.files, ...Array.from(input.files)];
        renderTool(state.activeTool);
        return;
      }
      const filesArr = Array.from(input.files);
      const validFiles = filterType(filesArr, state.activeTool);
      if (validFiles.length === 0) {
        showToast("Extensión de archivo no válida", "error");
        return;
      }
      state.files = [...state.files, ...validFiles];
      if (state.activeTool === 'compare') window._compareState = null;
      if (state.activeTool === 'metadata') window._metadataDraft = null;
      showToast(`${validFiles.length} archivo(s) añadidos`, "success");
      renderTool(state.activeTool);

      state.files.splice(i, 1);
      if (state.activeTool === 'compare') window._compareState = null;

      renderTool(state.activeTool);

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      downloadBlob(filename, blob);
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function parsePageSelection(inputStr, pageCount) {
      if (!inputStr || !inputStr.trim()) {
        return Array.from({ length: pageCount }, (_, idx) => idx);
      }

      const indices = new Set();
      const parts = inputStr.split(',').map(part => part.trim()).filter(Boolean);
      parts.forEach(part => {
        const rangeMatch = part.match(/^(\d+)\s*-\s*(\d+)$/);
        if (rangeMatch) {
          let start = parseInt(rangeMatch[1], 10);
          let end = parseInt(rangeMatch[2], 10);
          if (Number.isNaN(start) || Number.isNaN(end)) return;
          if (start > end) [start, end] = [end, start];
          for (let page = start; page <= end; page++) {
            if (page >= 1 && page <= pageCount) indices.add(page - 1);
          }
          return;
        }

        const single = parseInt(part, 10);
        if (!Number.isNaN(single) && single >= 1 && single <= pageCount) {
          indices.add(single - 1);
        }
      });

      return Array.from(indices).sort((a, b) => a - b);
    }

    async function canvasToBlob(canvas, mimeType, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('No se pudo generar la imagen.'));
        }, mimeType, quality);
      });
    }



    // ─── Real Document Processing ───
    async function downloadFakeFile(filename, customHtmlContent = null) {
      if (filename.toLowerCase().endsWith('.pdf')) {
        let pdfBytes;
        try {
          const { PDFDocument } = window.PDFLib;
          const pdfDoc = await PDFDocument.create();
          const page = pdfDoc.addPage();
          page.drawText(customHtmlContent ? "Documento Generado Exitosamente." : "Archivo procesado y generado por el motor QAXI PDFix.", { x: 50, y: page.getSize().height - 100, size: 24 });
          await applyAutoWatermark(pdfDoc);
          pdfBytes = await pdfDoc.save();
        } catch (e) {
          console.error(e);
          showToast("Error simulando la descarga.", "error");
          return;
        }
        const wblob = new Blob([pdfBytes], { type: 'application/pdf' });
        const wurl = URL.createObjectURL(wblob);
        const wa = document.createElement('a');
        wa.href = wurl;
        wa.download = filename;
        wa.click();
        URL.revokeObjectURL(wurl);
        return;
      }

      let textContent = "Resultado generado desde PDFix:\n\n";
      if (customHtmlContent) textContent += customHtmlContent.replace(/<[^>]*>?/gm, '');
      else textContent += "Este es un archivo resultante.";

      const ext = filename.split('.').pop().toLowerCase();
      let mime = 'text/plain';
      if (ext === 'docx') mime = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      if (ext === 'xlsx') mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      if (ext === 'pptx') mime = 'application/vnd.openxmlformats-officedocument.presentationml.presentation';

      const blob = new Blob([textContent], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function simulateProcess(toolId, callback) {
      const btn = document.querySelector('.btn-primary');
      if (!btn) return;

      const originalText = btn.innerHTML;
      btn.disabled = true;

      const progressMsgs = {
        compress: ['Analizando streams de objetos...', 'Comprimiendo recursos...', 'Reduciendo calidad de imagen...', 'Optimizando estructura...'],
        repair: ['Escaneando corrupción de xref...', 'Reconstruyendo tabla de objetos...', 'Recuperando objetos huérfanos...', 'Validando integridad...'],
        protect: ['Incrustando marcas de seguridad...', 'Configurando permisos...', 'Cifrando metadatos simbólicos...', 'Verificando integridad final...'],
        default: ['Cargando documento...', 'Analizando estructura...', 'Aplicando cambios...', 'Finalizando proceso...']
      };
      const msgs = progressMsgs[toolId] || progressMsgs.default;

      // Crear barra de progreso real debajo del botón
      const progressWrap = document.createElement('div');
      progressWrap.style.cssText = 'width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:4px; margin-top:16px; overflow:hidden; position:relative;';
      const progressBar = document.createElement('div');
      progressBar.style.cssText = 'width:0%; height:100%; background:var(--red); transition:width 0.3s ease; box-shadow:0 0 10px var(--red-glow);';
      progressWrap.appendChild(progressBar);
      btn.parentNode.insertBefore(progressWrap, btn.nextSibling);

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 8;
        if (progress > 95) {
          clearInterval(interval);
        } else {
          const msg = msgs[Math.min(Math.floor(progress / 25), 3)];
          btn.innerHTML = `<span class="spinner"></span> ${msg} ${Math.round(progress)}%`;
          progressBar.style.width = progress + '%';
        }
      }, 150);

      async function finish() {
        try {
          // Log detallado para debugging profesional
          console.group(`[PDFix] Ejecutando: ${toolId}`);
          console.log(`Payload: ${state.files.length} archivo(s)`);

          await callback();

          btn.innerHTML = `${ICONS.Check} ¡Completado!`;
          progressBar.style.width = '100%';
          showToast("Proceso finalizado con éxito", "success");
          console.log("Estado: Éxito");
          console.groupEnd();

          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            progressWrap.remove();
          }, 3000);
        } catch (e) {
          console.error(`[PDFix Error] Failla en ${toolId}:`, e);
          console.groupEnd();

          btn.innerHTML = `${ICONS.Rotate} Reintentar`;
          btn.disabled = false;
          progressBar.style.background = '#ef4444';

          let userMsg = "Error inesperado al procesar el PDF.";
          if (e.message?.includes('encrypted')) userMsg = "El PDF está protegido/cifrado y no puede procesarse.";
          if (e.message?.includes('corrupt')) userMsg = "El archivo PDF parece estar dañado.";
          if (e.message?.includes('Worker')) userMsg = "Error en el motor de procesamiento. Recarga la página.";

          showToast(userMsg, "error");
          setTimeout(() => progressWrap.remove(), 5000);
        }
      }

      // Iniciamos el proceso real en paralelo a la simulación visual
      setTimeout(finish, 2000 + Math.random() * 2000);
    }

    async function doExportImages() {
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const pdfJs = await initPdfJs();
      const pdf = await pdfJs.getDocument({ data: ab }).promise;
      const format = window._imgFormat || 'png';
      const mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';
      const quality = Math.max(0.4, Math.min(1, (window._imgQuality || 92) / 100));
      const scale = window._imgScale || 2;
      const baseName = file.name.replace(/\.pdf$/i, '');

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        // Apply watermark on canvas
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.save();
        ctx.globalAlpha = 0.13;
        ctx.fillStyle = '#888888';
        ctx.font = `bold ${Math.round(w * 0.065)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.translate(w / 2, h / 2);
        ctx.rotate(-Math.PI / 4);
        ctx.fillText('PDFix Technologies', 0, 0);
        ctx.restore();
        ctx.save();
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = '#888888';
        ctx.font = `${Math.round(w * 0.018)}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('Exportado desde PDFix', 16, h - 12);
        ctx.restore();
        const blob = await canvasToBlob(canvas, mimeType, quality);
        downloadBlob(`${baseName}_pagina_${String(i).padStart(2, '0')}.${format}`, blob);
      }
    }

    async function doCropPages() {
      const { PDFDocument } = window.PDFLib;
      const file = state.files[0];
      const doc = await PDFDocument.load(await file.arrayBuffer(), { ignoreEncryption: true });
      const pages = doc.getPages();
      const indices = parsePageSelection(document.getElementById('cropPages')?.value || '', pages.length);
      const top = Math.max(0, parseFloat(document.getElementById('cropTop')?.value || '0'));
      const right = Math.max(0, parseFloat(document.getElementById('cropRight')?.value || '0'));
      const bottom = Math.max(0, parseFloat(document.getElementById('cropBottom')?.value || '0'));
      const left = Math.max(0, parseFloat(document.getElementById('cropLeft')?.value || '0'));

      if (!indices.length) throw new Error('No se seleccionaron paginas validas.');

      indices.forEach(index => {
        const page = pages[index];
        const width = page.getWidth();
        const height = page.getHeight();
        const cropWidth = width - left - right;
        const cropHeight = height - top - bottom;
        if (cropWidth <= 20 || cropHeight <= 20) {
          throw new Error(`El recorte deja el area util demasiado pequena en la pagina ${index + 1}.`);
        }
        page.setCropBox(left, bottom, cropWidth, cropHeight);
      });

      await applyAutoWatermark(doc);
      const pdfBytes = await doc.save();
      downloadBlob(file.name.replace(/\.pdf$/i, '') + '_recortado.pdf', new Blob([pdfBytes], { type: 'application/pdf' }));
    }

    function formatPdfDate(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return 'No disponible';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;

    async function loadMetadataPreview(forceReload) {
      if (!state.files.length) return;
      if (window._metadataLoading && !forceReload) return;
      window._metadataLoading = true;
      try {
        const { PDFDocument } = window.PDFLib;
        const doc = await PDFDocument.load(await state.files[0].arrayBuffer(), { updateMetadata: false, ignoreEncryption: true });
        const getValue = (methodName, fallback = '') => typeof doc[methodName] === 'function' ? (doc[methodName]() || fallback) : fallback;
        const draft = {
          title: getValue('getTitle'),
          author: getValue('getAuthor'),
          subject: getValue('getSubject'),
          keywords: typeof doc.getKeywords === 'function' ? (doc.getKeywords() || []) : [],
          creator: getValue('getCreator'),
          producer: getValue('getProducer')
        };
        window._metadataDraft = draft;

        const fields = {
          metaTitle: draft.title || '',

    function escapeCsvCell(value) {
      return `"${String(value || '').replace(/"/g, '""')}"`;
    }

    function median(values) {
      if (!values.length) return 0;
      const sorted = [...values].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function normalizePdfTextItems(textContent, viewportHeight) {
      const items = (textContent?.items || [])
        .map(item => {
          const text = String(item.str || '').replace(/\s+/g, ' ').trim();
          if (!text) return null;
          const t = item.transform || [1, 0, 0, 1, 0, 0];
          const x = Number.isFinite(t[4]) ? t[4] : 0;
          const y = Number.isFinite(t[5]) ? (viewportHeight - t[5]) : 0;
          const fontSize = Math.max(8, Math.min(42, Math.abs(t[0]) || Math.abs(t[3]) || 10));
          const width = Math.max(4, Number.isFinite(item.width) ? item.width : text.length * fontSize * 0.42);
          const height = Math.max(8, Number.isFinite(item.height) ? item.height : fontSize);
          return { text, x, y, width, height, fontSize };
        })
        .filter(Boolean);
      return items.sort((a, b) => (a.y === b.y ? a.x - b.x : a.y - b.y));
    }

    function buildTextLines(items) {
      if (!items.length) return [];
      const yTol = Math.max(2, Math.min(12, median(items.map(i => i.height)) * 0.55));
      const lines = [];
      for (const item of items) {
        let bestLine = null;
        let bestDist = Infinity;
        for (const line of lines) {
          const dist = Math.abs(item.y - line.y);
          if (dist <= yTol && dist < bestDist) {
            bestDist = dist;
            bestLine = line;
          }
        }
        if (!bestLine) {
          lines.push({ y: item.y, items: [item] });
        } else {
          const count = bestLine.items.length;
          bestLine.y = (bestLine.y * count + item.y) / (count + 1);
          bestLine.items.push(item);
        }
      }

      return lines
        .sort((a, b) => a.y - b.y)
        .map(line => {
          const sorted = line.items.sort((a, b) => a.x - b.x);
          const segments = [];
          for (const item of sorted) {
            if (!segments.length) {
              segments.push({ ...item });
              continue;
            }
            const prev = segments[segments.length - 1];
            const gap = item.x - (prev.x + prev.width);
            const mergeGap = Math.max(2, Math.min(18, (prev.fontSize + item.fontSize) * 0.22));
            if (gap <= mergeGap) {
              const joiner = /[-/([{]$/.test(prev.text) ? '' : ' ';
              prev.text = `${prev.text}${joiner}${item.text}`.trim();
              prev.width = Math.max(prev.width, (item.x + item.width) - prev.x);
              prev.fontSize = Math.max(prev.fontSize, item.fontSize);
              prev.height = Math.max(prev.height, item.height);
            } else {
              segments.push({ ...item });
            }
          }
          return {
            y: line.y,
            segments,
            text: segments.map(s => s.text).join(' ').replace(/\s+/g, ' ').trim()
          };
        })
        .filter(line => line.segments.length && line.text);
    }

    function detectColumnAnchors(lines) {
      const xs = [];
      const widths = [];
      for (const line of lines) {
        for (const seg of line.segments) {
          if (!seg.text) continue;
          xs.push(seg.x);
          widths.push(seg.width);
        }
      }
      if (xs.length < 2) return [];
      xs.sort((a, b) => a - b);
      const snap = Math.max(18, Math.min(48, (median(widths) || 50) * 0.55));
      const clusters = [];
      for (const x of xs) {
        const last = clusters[clusters.length - 1];
        if (!last || Math.abs(x - last.x) > snap) {
          clusters.push({ x, count: 1 });
        } else {
          last.x = ((last.x * last.count) + x) / (last.count + 1);
          last.count++;
        }
      }
      const minCount = Math.max(2, Math.floor(lines.length * 0.08));
      const filtered = clusters.filter(c => c.count >= minCount);
      const anchors = (filtered.length >= 2 ? filtered : clusters).map(c => c.x).sort((a, b) => a - b);
      if (anchors.length <= 10) return anchors;
      while (anchors.length > 10) {
        let bestIdx = 0;
        let bestGap = Infinity;
        for (let i = 1; i < anchors.length; i++) {
          const gap = anchors[i] - anchors[i - 1];
          if (gap < bestGap) {
            bestGap = gap;
            bestIdx = i;
          }
        }
        anchors[bestIdx - 1] = (anchors[bestIdx - 1] + anchors[bestIdx]) / 2;
        anchors.splice(bestIdx, 1);
      }
      return anchors;
    }

    function mapLineToColumns(line, anchors) {
      if (!anchors.length) return [line.text];
      const row = Array.from({ length: anchors.length }, () => '');
      for (const seg of line.segments) {
        let bestIdx = 0;
        let bestDist = Infinity;
        for (let i = 0; i < anchors.length; i++) {
          const dist = Math.abs(seg.x - anchors[i]);
          if (dist < bestDist) {
            bestDist = dist;
            bestIdx = i;
          }
        }
        row[bestIdx] = row[bestIdx] ? `${row[bestIdx]} ${seg.text}` : seg.text;
      }
      const cleaned = row.map(c => c.replace(/\s+/g, ' ').trim());
      if (cleaned.every(c => !c)) return [line.text];
      return cleaned;
    }

    async function extractStructuredPage(page) {
      const viewport = page.getViewport({ scale: 1.35 });
      const textContent = await page.getTextContent();
      const items = normalizePdfTextItems(textContent, viewport.height);
      const lines = buildTextLines(items);
      const anchors = detectColumnAnchors(lines);
      const rows = lines.map(line => mapLineToColumns(line, anchors));
      return { rows, lines, anchors };
    }

    async function doExtractCSV() {
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const pdfLib2 = await initPdfJs();
      const pdf = await pdfLib2.getDocument({ data: ab }).promise;
      const chunks = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const structured = await extractStructuredPage(page);
        const tabularRows = structured.rows.filter(row => row.filter(Boolean).length >= 2);
        let rows = tabularRows;

        // Fallback: cuando no hay tabla real, exportar líneas limpias en una sola columna.
        if (rows.length < 3) {
          rows = structured.lines.map(line => [line.text]);
        }

        if (!rows.length) continue;
        const colCount = Math.max(1, ...rows.map(r => r.length));
        chunks.push(`"--- Página ${i} ---"`);
        rows.forEach(row => {
          const padded = Array.from({ length: colCount }, (_, idx) => row[idx] || '');
          chunks.push(padded.map(escapeCsvCell).join(';'));
        });
        chunks.push('');
      }

      let csvContent = chunks.join('\n').trim();
      if (!csvContent) csvContent = 'No se encontró texto extraíble en el PDF.';
      downloadTextFile(file.name.replace(/\.pdf$/i, '.csv'), csvContent);
    }

    async function doConvertToWord() {
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const pdfLib2 = await initPdfJs();
      const pdf = await pdfLib2.getDocument({ data: ab }).promise;
      if (!window.docx) {
        throw new Error('La librería DOCX no está disponible en esta sesión.');
      }

      const {
        Document, Packer, Paragraph, HeadingLevel,
        Table, TableRow, TableCell, WidthType
      } = window.docx;

      const children = [];

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const structured = await extractStructuredPage(page);
        const tableRows = structured.rows.filter(row => row.filter(Boolean).length >= 2);
        children.push(new Paragraph({
          text: `Página ${i}`,
          heading: HeadingLevel.HEADING_2
        }));

        // Si detectamos estructura tabular consistente, usar tabla real en Word.
        if (tableRows.length >= 3) {
          const maxCols = Math.max(1, ...tableRows.map(r => r.length));
          const rows = tableRows.map(row => {
            const padded = Array.from({ length: maxCols }, (_, idx) => row[idx] || '');
            return new TableRow({
              children: padded.map(cell => new TableCell({
                children: [new Paragraph({ text: cell || ' ' })]
              }))
            });
          });
          children.push(new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows
          }));
        } else {
          structured.lines.forEach(line => {
            children.push(new Paragraph({ text: line.text || ' ' }));
          });
        }

        children.push(new Paragraph({ text: '' }));
      }

      const doc = new Document({ sections: [{ children }] });
      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = file.name.replace(/\.pdf$/i, '') + '_editable.docx';
      a.click();
      URL.revokeObjectURL(url);
    }

    async function doExportPPTX() {

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);

        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        const slide = pptx.addSlide();
        const bgData = canvas.toDataURL('image/jpeg', 0.92);

        const textContent = await page.getTextContent();
        textContent.items.forEach(item => {
          const txt = String(item.str || '').trim();
          if (!txt) return;
          const x = (item.transform[4] / viewport.width) * 13.333;
          const y = ((viewport.height - item.transform[5]) / viewport.height) * 7.5;
          const fs = Math.max(8, Math.min(20, Math.round(Math.abs(item.transform[0]))));
          const w = Math.max(0.25, ((item.width || fs * txt.length * 0.45) / viewport.width) * 13.333);
          slide.addText(txt, { x, y, w, h: 0.24, fontSize: fs, color: '111111' });
        });

        const thumb = document.createElement('div');
        thumb.style.cssText = 'display:inline-block;border-radius:8px;overflow:hidden;border:1px solid var(--border);';
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/jpeg', 0.4); img.style.cssText = 'width:100px;height:auto;display:block;';
        const label = document.createElement('div');
        label.style.cssText = 'text-align:center;font-size:11px;color:var(--text4);padding:4px;';
        label.textContent = 'Pág. ' + i;
        thumb.appendChild(img); thumb.appendChild(label);
        if (previewArea) previewArea.appendChild(thumb);
      }
      await pptx.writeFile({ fileName: file.name.replace(/\.pdf$/i, '') + '_editable.pptx' });
    }

    async function doCreatePdf() {
      const { PDFDocument } = window.PDFLib;
      const pdfDoc = await PDFDocument.create();

      for (const file of state.files) {
        const type = file.type;
        if (type.startsWith('image/')) {
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const im = new Image();
              im.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = im.width;
                canvas.height = im.height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white'; // Fondo para imágenes transparentes como png, webp o svg
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(im, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.95)); // Convertimos universalmente a JPEG de alta calidad
              };
              im.onerror = reject;
              im.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          const base64Data = dataUrl.split(',')[1];
          const binaryStr = atob(base64Data);
          const jpgBytes = new Uint8Array(binaryStr.length);
          for (let k = 0; k < binaryStr.length; k++) jpgBytes[k] = binaryStr.charCodeAt(k);
          const img = await pdfDoc.embedJpg(jpgBytes);

          const page = pdfDoc.addPage([img.width, img.height]);
          page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
        } else if (type === 'text/plain') {
          const text = await file.text();
          const page = pdfDoc.addPage();
          page.drawText(text, { x: 50, y: page.getSize().height - 50, size: 12 });
        }
      }

      await applyAutoWatermark(pdfDoc);
      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'exportado.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ─── Real Compression Engine (Resampling) ───
    async function doCompress() {
      const file = state.files[0];
      const originalSize = file.size;
      const ab = await file.arrayBuffer();

      const compLevel = document.getElementById('compLevel').value;
      let quality = 0.5; let scale = 0.9; // Medium default
      if (compLevel === 'extreme') { quality = 0.25; scale = 0.75; }
      if (compLevel === 'low') { quality = 0.85; scale = 1.0; }

      showToast("Iniciando compresión...", "info");

      try {
        const pdfjs = await initPdfJs();
        const loadingTask = pdfjs.getDocument({ data: ab });
        const pdf = await loadingTask.promise;
        const totalPages = pdf.numPages;

        const { PDFDocument } = window.PDFLib;
        const newDoc = await PDFDocument.create();

        for (let i = 1; i <= totalPages; i++) {
          showToast(`Optimizando página ${i}/${totalPages}...`, "info");
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({ canvasContext: context, viewport: viewport }).promise;
          const imgData = canvas.toDataURL('image/jpeg', quality);
          const imgBytes = await fetch(imgData).then(res => res.arrayBuffer());
          const embeddedImg = await newDoc.embedJpg(imgBytes);
          const newDocPage = newDoc.addPage([embeddedImg.width, embeddedImg.height]);
          newDocPage.drawImage(embeddedImg, { x: 0, y: 0, width: embeddedImg.width, height: embeddedImg.height });

          // Clear canvas memory
          canvas.width = 0; canvas.height = 0;
        }

        await applyAutoWatermark(newDoc);
        const pdfBytes = await newDoc.save();
        const newSize = pdfBytes.length;
        const reduction = Math.round((1 - newSize / originalSize) * 100);

        const resultDiv = document.getElementById('compResult');
        resultDiv.innerHTML = `
          <div class="result-box">
            <div class="label">COMPRESIÓN REAL FINALIZADA</div>
            <div class="result-row">
              <div><div class="val old">${(originalSize / 1024).toFixed(1)} KB</div><div class="sub">Original</div></div>
              <div class="arrow">→</div>
              <div><div class="val new">${(newSize / 1024).toFixed(1)} KB</div><div class="sub">Final</div></div>
            </div>
            <div style="margin-top:12px;font-size:14px;color:var(--red);font-weight:700;">
              ${reduction > 0 ? `Peso reducido en un ${reduction}%` : 'El archivo ya estaba optimizado'}
            </div>
          </div>`;

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'comprimido.pdf';
        a.click(); URL.revokeObjectURL(url);
        showToast("PDF optimizado exitosamente", "success");
      } catch (e) {
        showToast("Error crítico en el motor: " + e.message, "error");
        console.error(e);
      }
    }

    async function initAdvEditor() {
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const pdfLibInstance = await initPdfJs();
      window._advPdfDoc = await pdfLibInstance.getDocument({ data: ab }).promise;
