<html lang="es">

<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link

  <!-- Librerías con versiones fijas y SRI REAL validado (2025-2026 Core Stack) -->

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"

  <script src="https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.min.js"
    crossorigin="anonymous"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --red: #FF3366;
      --red-dark: #cc2952;
      --red-darker: #991f3d;
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --surface2: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.95);
      --text2: rgba(255, 255, 255, 0.6);
      --text3: rgba(255, 255, 255, 0.4);
      --text4: rgba(255, 255, 255, 0.5);
      --red-glow: rgba(255, 51, 102, 0.4);
      --red-bg: rgba(255, 51, 102, 0.1);
      --red-bg2: rgba(255, 51, 102, 0.05);
      --red-bg3: rgba(255, 51, 102, 0.15);
      --gradient-brand: linear-gradient(135deg, #FF3366, #FF6B35);
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2)
    }

    /* Animated BG */
    .bg-glow {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0
    }

    .bg-glow .g1 {
      position: absolute;
      top: -25%;
      right: -25%;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.06) 0%, transparent 70%);
      animation: pulse1 8s ease-in-out infinite
    }

    .bg-glow .g2 {
      position: absolute;
      bottom: -25%;
      left: -25%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.04) 0%, transparent 70%);
      animation: pulse2 10s ease-in-out infinite
    }

    @keyframes pulse1 {

      0%,
      100% {
        transform: scale(1);
        opacity: .5
      }

      50% {
        transform: scale(1.1);
        opacity: 1
      }
    }

    @keyframes pulse2 {

      0%,
      100% {
        transform: scale(1.1);
        opacity: 1
      }

      50% {
        transform: scale(1);
        opacity: .5
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(.95)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .fade-up {
      animation: fadeUp .6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards
    }

    .scale-in {
      animation: scaleIn .4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards
    }

    .float-icon {
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .dropzone:hover .dropzone-icon {
      transform: translateY(-8px) scale(1.05);
      background: var(--red);
    }

    .dropzone:hover .dropzone-icon svg {
      color: #fff;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(5, 5, 5, 0.75);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: translateY(-1px);
    }

    .logo-img {
      height: 48px;
      object-fit: contain;
      transition: all 0.3s ease;
    }

    .logo:hover .logo-img {
      transform: scale(1.05);
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.04em;
      color: var(--text);
      display: flex;
      align-items: center;
    }

    .logo-text .fix {
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px
    }

    .badge-incognito {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--red-bg);
      display: none
    }

    .badge-incognito.active {
      display: flex
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse1 2s ease-in-out infinite
    }

    .badge-incognito span {
      font-size: 12px;
      font-weight: 600;
      color: var(--red)
    }

    .by-qaxi {
      font-size: 12px;
      color: var(--text3);
      font-family: 'Space Mono', monospace
    }

    .menu-btn {
      display: none;
      padding: 8px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer
    }

    .menu-btn svg {
      width: 24px;
      height: 24px
    }

    /* Main */
    main {
      position: relative;
      z-index: 10;
      padding-top: clamp(72px, 8.5vh, 100px);
      min-height: 100vh
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px
    }

    .tool-container {
      max-width: 768px;
      margin: 0 auto;
      padding: 0 24px
    }

    .logo-sticker {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 4px;
    }

    .logo-sticker svg {
      width: 100%;
      height: 100%;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: clamp(64px, 8vh, 96px) 0 48px;
      position: relative;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.1;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.05em;
      margin-bottom: 24px;
      color: #fff;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(to right, #fff, var(--red));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 51, 102, 0.2);
    }

    .hero p {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.6;
      color: var(--text2);
      font-weight: 400;
    }

    /* Category */
    .category {
      margin-bottom: 64px
    }

    .category-header {
      margin-bottom: 32px
    }

    .category-header h2 {
      font-size: clamp(1.5rem, 3vw, 1.875rem);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text)
    }

    .category-header p {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text3)
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px
    }

    #toolCategories {
      margin-top: 34px;
    }

    /* Tool Card */
    .tool-card {
      text-align: left;
      padding: 24px;
      border-radius: 16px;
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .4s cubic-bezier(.4, 0, .2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .tool-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(255, 51, 102, 0.4);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 12px 40px var(--red-bg2);
    }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: all .3s
    }

    .tool-icon svg {
      width: 24px;
      height: 24px
    }

    .tool-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text)
    }

    .tool-card .desc {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text4)
    }

    .tool-card .cta {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity .3s;
      font-size: 12px;
      font-weight: 600
    }

    .tool-card:hover .cta {
      opacity: 1
    }

    /* Tool View */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      padding: 0;
      transition: color .2s
    }

    .back-btn:hover {
      color: #fff
    }

    .back-btn svg {
      width: 20px;
      height: 20px
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px
    }

    .tool-header .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .tool-header .icon svg {
      width: 36px;
      height: 36px;
    }

    .tool-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
      color: #fff;
    }

    .tool-header .desc {
      font-size: 15px;
      color: var(--text4);
      font-weight: 500;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Enhanced Dropzone */
    .dropzone {
      border: 2px dashed var(--border2);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
    }

    .dropzone:hover,
    .dropzone.dragging {
      background: rgba(255, 51, 102, 0.05);
      border-color: var(--red);
      transform: scale(1.01);
    }

    .dropzone-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
    }

    .dropzone-icon svg {
      width: 24px;
      height: 24px;
      color: var(--red)
    }

    .dropzone h4 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text)
    }

    .dropzone p {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text4)
    }

    .dropzone input {
      display: none
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      color: #fff;
      background: var(--gradient-brand);
      font-family: inherit;
      transition: all .3s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 32px var(--red-bg3);
    }

    .btn-primary:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px var(--red-glow);
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      filter: grayscale(0.5);
    }

    .btn-primary svg {
      width: 20px;
      height: 20px
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05)
    }

    /* Toggle Bar */
    .toggle-bar {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 16px;
      background: var(--surface2)
    }

    .toggle-bar button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      background: transparent;
      color: var(--text2)
    }

    .toggle-bar button.active {
      background: var(--red);
      color: #fff
    }

    /* File List */
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface2)
    }

    .file-item+.file-item {
      margin-top: 8px
    }

    .file-item .file-icon svg {
      width: 32px;
      height: 32px;
      color: var(--red)
    }

    .file-item .file-info {
      flex: 1;
      min-width: 0
    }

    .file-item .file-name {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .file-item .file-size {
      font-size: 12px;
      color: var(--text4)
    }

    .file-item .file-idx {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--red-bg3);
      color: var(--red)
    }

    .file-item .btn-icon {
      padding: 4px;
      border-radius: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      transition: all .2s
    }

    .file-item .btn-icon:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--red)
    }

    /* Format Pills */
    .format-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .format-pill {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .format-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff
    }

    /* Quality Cards */
    .quality-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px
    }

    .quality-card {
      padding: 16px;
      border-radius: 12px;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all .2s
    }

    .quality-card.active {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .quality-card .q-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text2)
    }

    .quality-card.active .q-label {
      color: var(--red)
    }

    .quality-card .q-desc {
      font-size: 12px;
      margin-top: 4px;
      color: var(--text4)
    }

    .quality-card .q-pct {
      font-size: 24px;
      font-weight: 700;
      margin-top: 8px;
      color: var(--text3)
    }

    .quality-card.active .q-pct {
      color: var(--red)
    }

    /* Result Box */
    .result-box {
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      background: var(--red-bg2);
      border: 1px solid var(--red-bg3)
    }

    .result-box .label {
      font-size: 14px;
      color: var(--text2)
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 12px
    }

    .result-row .val {
      font-size: 28px;
      font-weight: 700
    }

    .result-row .val.old {
      color: var(--text3)
    }

    .result-row .val.new {
      color: var(--red)
    }

    .result-row .sub {
      font-size: 12px;
      color: var(--text4)
    }

    .category-header h2 {
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .category-header p {
      font-size: 15px;
      color: var(--text4);
      font-weight: 500;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px
    }

    .tool-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tool-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .tool-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255, 51, 102, 0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .tool-card:hover::after {
      opacity: 1;
    }

    .tool-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      transition: all 0.4s;
      flex-shrink: 0;
    }

    .tool-card:hover .tool-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .tool-icon svg {
      width: 28px;
      height: 28px
    }

    /* Page Grid */
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px
    }

    .page-thumb {
      position: relative;
      padding: 8px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: grab;
      transition: all .2s
    }

    .page-thumb:active {
      cursor: grabbing
    }

    .page-thumb.dragging {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .page-thumb .page-inner {
      aspect-ratio: 3/4;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      transition: transform .3s
    }

    .page-thumb .page-num {
      font-size: 32px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.15)
    }

    .page-thumb .page-label {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      color: var(--text2)
    }

    .page-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s
    }

    .page-thumb:hover .page-actions {
      opacity: 1
    }

    .page-actions button {
      padding: 4px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .page-actions button svg {
      width: 16px;
      height: 16px
    }

    .page-actions button.del {
      color: var(--red)
    }

    /* Editor */
    .editor-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border)
    }

    .editor-toolbar button {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .editor-toolbar button:hover {
      background: rgba(255, 255, 255, 0.05)
    }

    .editor-canvas {
      border-radius: 16px;
      padding: 32px;
      min-height: 400px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5)
    }

    .editor-canvas textarea,
    .editor-canvas [contenteditable] {
      width: 100%;
      min-height: 350px;
      resize: none;
      outline: none;
      border: none;
      background: transparent;
      font-family: Georgia, serif;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a
    }

    /* Signature */
    .sig-canvas-wrap {
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1)
    }

    .sig-canvas {
      width: 100%;
      height: 200px;
      cursor: crosshair;
      touch-action: none;
      display: block
    }

    .sig-typed {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 24px;
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Brush Script MT', cursive
    }

    .sig-preview {
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      background: rgba(255, 255, 255, 0.95)
    }

    .sig-preview p {
      font-size: 40px;
      color: var(--red);
      font-family: 'Brush Script MT', cursive
    }

    /* Protect */
    .form-group {
      margin-bottom: 16px
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 8px
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border2);
      font-family: inherit
    }

    .form-input::placeholder {
      color: var(--text4)
    }

    .permissions {
      padding: 16px;
      border-radius: 12px;
      background: var(--surface)
    }

    .perm-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 4px 0
    }

    .perm-row+.perm-row {
      margin-top: 12px
    }

    .perm-check {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0
    }

    .perm-check.on {
      background: var(--red)
    }

    .perm-check.off {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2)
    }

    .perm-check svg {
      width: 14px;
      height: 14px;
      color: #fff
    }

    .perm-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7)
    }

    /* Watermark */
    .wm-options {
      display: flex;
      gap: 12px
    }

    .wm-opt {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2)
    }

    .wm-opt.active {
      border-color: var(--red);
      background: var(--red-bg);
      color: var(--red)
    }

    .wm-preview {
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      min-height: 300px
    }

    .wm-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .3s
    }

    .wm-overlay.text-wm {
      font-size: 48px;
      font-weight: 700;
      transform: rotate(-45deg);
      color: rgba(220, 38, 38, 0.5)
    }

    .wm-overlay.logo-wm svg {
      width: 128px;
      height: 128px;
      color: rgba(220, 38, 38, 0.5)
    }

    .wm-lines {
      position: relative;
      z-index: 1
    }

    .wm-line {
      height: 12px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.08);
      margin-bottom: 12px
    }

    .opacity-slider {
      width: 100%;
      accent-color: var(--red);
      appearance: none;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none
    }

    .opacity-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px
    }

    .slider-header span {
      font-size: 14px;
      color: var(--text2)
    }

    .slider-header .val {
      font-family: 'Space Mono', monospace;
      color: var(--red)
    }

    /* OCR */
    .lang-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .lang-pill {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text2);
      cursor: pointer;
      font-family: inherit;
      transition: all .2s
    }

    .lang-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff
    }

    .ocr-result {
      border-radius: 16px;
      padding: 24px;
      background: var(--surface2);
      border: 1px solid var(--border)
    }

    .ocr-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px
    }

    .ocr-result-header span {
      font-size: 14px;
      font-weight: 500;
      color: var(--red)
    }

    .ocr-result-header button {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 8px;
      background: var(--red-bg);
      color: var(--red);
      border: none;
      cursor: pointer;
      font-family: inherit
    }

    .ocr-result p {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
      white-space: pre-wrap
    }

    /* Scan */
    .scan-viewport {
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #000;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .scan-center {
      text-align: center
    }

    .scan-center .scan-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      background: rgba(220, 38, 38, 0.15)
    }

    .scan-center .scan-icon svg {
      width: 24px;
      height: 24px;
      color: var(--red)
    }

    .scan-center p {
      font-size: 14px;
      color: var(--text2)
    }

    .scan-frame {
      position: absolute;
      inset: 32px;
      border: 2px solid rgba(220, 38, 38, 0.4);
      border-radius: 12px
    }

    .scan-corner {
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--red)
    }

    .scan-corner.tl {
      top: -1px;
      left: -1px;
      border-top: 2px solid;
      border-left: 2px solid;
      border-radius: 12px 0 0 0
    }

    .scan-corner.tr {
      top: -1px;
      right: -1px;
      border-top: 2px solid;
      border-right: 2px solid;
      border-radius: 0 12px 0 0
    }

    .scan-corner.bl {
      bottom: -1px;
      left: -1px;
      border-bottom: 2px solid;
      border-left: 2px solid;
      border-radius: 0 0 0 12px
    }

    .scan-corner.br {
      bottom: -1px;
      right: -1px;
      border-bottom: 2px solid;
      border-right: 2px solid;
      border-radius: 0 0 12px 0
    }

    /* Privacy */
    .privacy-box {
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      background: var(--red-bg2);
      border: 1px solid var(--red-bg)
    }

    .privacy-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      background: var(--red-bg)
    }

    .privacy-icon svg {
      width: 24px;
      height: 24px;
      color: var(--red)
    }

    .privacy-box h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text)
    }

    .privacy-box>p {
      font-size: 14px;
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto;
      color: var(--text2)
    }

    .privacy-features {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center
    }

    .privacy-feat {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .privacy-feat .feat-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(220, 38, 38, 0.2);
      flex-shrink: 0
    }

    .privacy-feat .feat-dot svg {
      width: 12px;
      height: 12px;
      color: var(--red)
    }

    .privacy-feat span {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7)
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid var(--border2);
      padding: 14px 24px;
      border-radius: 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      animation: toastIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .toast.success {
      border-color: rgba(16, 185, 129, 0.4);
    }

    .toast.error {
      border-color: rgba(239, 68, 68, 0.4);
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .toast.closing {
      animation: toastOut 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    /* Privacy Timer */
    .privacy-timer {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1200;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(12, 12, 12, 0.92);
      border: 1px solid rgba(220, 38, 38, 0.22);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }

    .privacy-timer.active {
      display: flex;
    }

    .timer-ring {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .timer-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-label {
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--text4);
      text-transform: uppercase;
      line-height: 1.1;
    }

    .timer-val {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--red);
      margin-top: 2px;
      line-height: 1;
    }

    .sig-obj {
      position: absolute;
      cursor: move;
      z-index: 100;
      border: 2px dashed transparent;
      border-radius: 8px;
      transition: border-color 0.2s;
    }

    .sig-obj:hover {
      border-color: rgba(255, 51, 102, 0.5);
    }

    .sig-obj.dragging {
      border-color: var(--red);
    }

    .sig-obj img {
      display: block;
      max-width: 100%;
      height: auto;
      pointer-events: none;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block
    }

    /* Footer */
    .footer {
      margin-top: 96px;
      padding: 32px 0;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05)
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px
    }

    .footer-logo svg {
      width: 20px;
      height: 20px;
      color: rgba(255, 255, 255, 0.2)
    }

    .footer-logo span {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      font-family: 'Space Mono', monospace
    }

    .footer p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.15)
    }

    /* Section spacing */
    .space-y>*+* {
      margin-top: 32px
    }

    .space-y-sm>*+* {
      margin-top: 16px
    }

    .mt-sm {
      margin-top: 12px
    }

    .mt-md {
      margin-top: 24px
    }

    .hidden {
      display: none !important
    }

    .tool-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .tool-content-side {
      flex: 1;
      min-width: 300px;
    }

    .tool-ad-side {
      width: 300px;
      flex-shrink: 0;
      position: sticky;
      top: 100px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
    }

    @media (max-width: 900px) {
      .tool-ad-side {
        display: none;
      }
    }

    /* Mobile */
    .mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(10, 10, 10, 0.98);
      padding: 80px 24px 24px;
      display: none;
      overflow-y: auto
    }

    .mobile-menu.open {
      display: block
    }

    .mobile-menu .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer
    }

    .mobile-menu .close-btn svg {
      width: 24px;
      height: 24px
    }

    .mobile-menu button.tool-link {
      width: 100%;
      text-align: left;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px
    }

    .mobile-menu button.tool-link:hover {
      background: var(--red-bg)
    }

    .mobile-menu button.tool-link svg {
      width: 20px;
      height: 20px
    }

    @media(max-width:768px) {
      .menu-btn {
        display: block
      }

      .header-right .by-qaxi {
        display: none
      }

      .hero {
        padding: 64px 0 40px
      }

      .quality-grid {
        grid-template-columns: 1fr
      }

      .tools-grid {
        grid-template-columns: 1fr 1fr
      }

      .wm-options {
        flex-direction: column
      }
    }

    @media(max-width:480px) {
      .tools-grid {
        grid-template-columns: 1fr
      }

      .privacy-timer {
        right: 12px;
        bottom: 12px;
        padding: 10px 12px;
      }

      .page-grid {
        grid-template-columns: repeat(3, 1fr)
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow">
    <div class="g1"></div>
    <div class="g2"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" onclick="showHome()">
        <img src="pdfix.png" alt="PDFix Logo" class="logo-img">
        <span class="logo-text">PD<span class="fix">Fix</span></span>
      </a>
      <div class="header-right">
        <div class="badge-incognito" id="headerBadge">
          <div class="badge-dot"></div><span>Incógnito</span>
        </div>
        <button class="menu-btn" onclick="toggleMobileMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" onclick="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
    <div id="mobileMenuTools"></div>
  </div>

  <!-- Main -->
  <main>
    <!-- Home -->
    <div id="homeView">
      <div class="container">
        <div id="toolCategories"></div>

        <!-- Google Ads (Home) -->
        <div style="text-align: center; margin: 1.25rem 0 2rem;">
          <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234567890123456"
            data-ad-slot="9876543210" data-ad-format="auto" data-full-width-responsive="true"></ins>
          <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
          </script>
        </div>
        <footer class="footer">
          <div class="footer-logo">
            <span>PDFix Technologies</span>
          </div>
          <p>PDFix — Hecho con precisión</p>
        </footer>
      </div>
    </div>

    <!-- Tool View -->
    <div id="toolView" class="hidden">
      <div class="tool-layout">
        <div class="tool-content-side">
          <div class="tool-container" style="padding-top:32px;padding-bottom:48px">
            <button class="back-btn" onclick="showHome()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
              </svg>
              Volver al inicio
            </button>
            <div id="toolHeader" class="tool-header"></div>
            <div id="toolContent" class="tool-content"></div>
          </div>
        </div>

        <!-- Google Ads (Sidebar Tool View) -->
        <div class="tool-ad-side">
          <div class="ad-placeholder">
            <ins class="adsbygoogle" style="display:inline-block;width:300px;height:600px"
              data-ad-client="ca-pub-1234567890123456" data-ad-slot="1234567890"></ins>
            <script>
              (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Privacy Timer -->
  <div class="privacy-timer" id="privacyTimer">
    <div class="timer-ring">
      <svg viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(220,38,38,0.15)" stroke-width="3" />
        <circle id="timerCircle" cx="18" cy="18" r="15" fill="none" stroke="#DC2626" stroke-width="3"
          stroke-dasharray="100 0" stroke-linecap="round" />
      </svg>
    </div>
    <div>
      <div class="timer-label">Modo Incógnito</div>

    // ─── Logo Processing (True Transparency) ───
    window._transparentLogo = null;
    async function getTransparentLogo() {
      if (window._transparentLogo) return window._transparentLogo;
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = 'pdfix.png';
        img.onload = () => {
          const cv = document.createElement('canvas');
          cv.width = img.width; cv.height = img.height;
          const ctx = cv.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const iData = ctx.getImageData(0, 0, cv.width, cv.height);
          const d = iData.data;
          for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g = d[i + 1], b = d[i + 2];
            // The checkerboard consists of white (255) and light grey (~204).
            // Both are neutral (R~G~B) and bright.
            const saturation = Math.max(r, g, b) - Math.min(r, g, b);
            const brightness = (r + g + b) / 3;
            // If it's neutral (low saturation) and relatively bright, it's background
            if (saturation < 50 && brightness > 120) {
              d[i + 3] = 0; // Make transparent
            }
          }
          ctx.putImageData(iData, 0, 0);
          window._transparentLogo = cv.toDataURL('image/png');
          resolve(window._transparentLogo);
        };
        img.onerror = () => resolve('pdfix.png'); // Fallback
      });
    }

    async function updateLogos() {

    // ─── Helpers ───
    const PDF_JS_VERSION = '3.11.174';
    const QPDF_CDN_BASE = 'https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist';
    const DEFAULT_MAX_FILE_SIZE = 50 * 1024 * 1024;
    const HEAVY_MAX_FILE_SIZE = 25 * 1024 * 1024;
    function el(id) { return document.getElementById(id); }
    function bytesToMB(bytes) { return (bytes / (1024 * 1024)).toFixed(0); }
    async function initPdfJs() {
      const pdfjs = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
      if (!pdfjs || typeof pdfjs.getDocument !== 'function') {
        throw new Error('PDF.js no está disponible.');
      }
      const workerUrl = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDF_JS_VERSION}/pdf.worker.min.js`;
      if (pdfjs.GlobalWorkerOptions && pdfjs.GlobalWorkerOptions.workerSrc !== workerUrl) {
        pdfjs.GlobalWorkerOptions.workerSrc = workerUrl;
      }
      return pdfjs;
    }
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === '1') { resolve(); return; }
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('No se pudo cargar script externo.')), { once: true });
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.crossOrigin = 'anonymous';
        script.onload = () => { script.dataset.loaded = '1'; resolve(); };
        script.onerror = () => reject(new Error('No se pudo cargar script externo.'));
        document.head.appendChild(script);
      });
    }
    function getToolSizeLimit(toolId) {
      const heavyTools = new Set(['compress', 'ocr', 'compare', 'advanced', 'sign']);
      return heavyTools.has(toolId) ? HEAVY_MAX_FILE_SIZE : DEFAULT_MAX_FILE_SIZE;
    }
    async function initQpdfModule() {
      if (window._qpdfModule) return window._qpdfModule;

      const ensureFactory = async () => {
        if (typeof window.Module === 'function') return window.Module;
        await loadScript(`${QPDF_CDN_BASE}/qpdf.min.js`);
        if (typeof window.Module !== 'function') {
          throw new Error('No se encontró la fábrica WASM de QPDF.');
        }
        return window.Module;
      };

      const factory = await ensureFactory();
      const moduleInstance = await factory({
        locateFile: (path) => `${QPDF_CDN_BASE}/${path}`
      });
      if (!moduleInstance || !moduleInstance.FS || typeof moduleInstance.callMain !== 'function') {
        throw new Error('QPDF WASM no inicializó correctamente.');
      }
      window._qpdfModule = moduleInstance;
      return moduleInstance;
    }
    function makeDropzone(id, accept, label, multi = true) {
      return `<div class="dropzone" id="${id}" onclick="el('${id}Input').click()"

    // ─── File Handling ───
    function filterType(files, tool) {
      if (tool === 'createpdf' || tool === 'advanced' || tool === 'ocr') {
        // Allow images, texts, etc for tools that accept them
        return files;
      }
      return files.filter(f => f.name.toLowerCase().endsWith('.pdf') || f.type === 'application/pdf');
    }

    function handleDrop(zoneId, e) {
      if (zoneId === 'sigUpDrop') return;
      const filesArr = Array.from(e.dataTransfer.files);

      const LARGE_FILE_LIMIT = getToolSizeLimit(state.activeTool);
      const tooLarge = filesArr.some(f => f.size > LARGE_FILE_LIMIT);
      if (tooLarge) {
        showToast(`Archivo demasiado grande (>${bytesToMB(LARGE_FILE_LIMIT)}MB).`, "error");
        return;
      }

      const validFiles = filterType(filesArr, state.activeTool);
      if (validFiles.length === 0) {
        showToast("Extensión de archivo no válida para esta herramienta", "error");
        return;
      }
      if (validFiles.length < filesArr.length) {
        showToast("Algunos archivos fueron omitidos por no ser PDF", "info");
      }
      state.files = [...state.files, ...validFiles];
      showToast(`${validFiles.length} archivo(s) añadidos`, "success");
      renderTool(state.activeTool);
    }
    function handleFileInput(zoneId, input) {
      if (zoneId === 'sigUpDrop') {
        state.files = [...state.files, ...Array.from(input.files)];
        renderTool(state.activeTool);
        return;
      }
      const filesArr = Array.from(input.files);
      const LARGE_FILE_LIMIT = getToolSizeLimit(state.activeTool);
      if (filesArr.some(f => f.size > LARGE_FILE_LIMIT)) {
        showToast(`Archivo excedió el límite de seguridad (${bytesToMB(LARGE_FILE_LIMIT)}MB)`, "error");
        input.value = ""; return;
      }

      const validFiles = filterType(filesArr, state.activeTool);
      if (validFiles.length === 0) {
        showToast("Extensión de archivo no válida", "error");
        return;
      }
      state.files = [...state.files, ...validFiles];
      showToast(`${validFiles.length} archivo(s) añadidos`, "success");
      renderTool(state.activeTool);
    }

    // ─── Privacy Timer ───
    function togglePrivacy() {
      state.privacyActive = !state.privacyActive;
      if (state.privacyActive) {
        state.privacySeconds = 900;
        state.timerInterval = setInterval(() => {
          state.privacySeconds--;
          if (state.privacySeconds <= 0) {
            state.privacyActive = false;
            clearInterval(state.timerInterval);
            state.timerInterval = null;
            state.privacySeconds = 900;
            state.files = [];

            showHome();
            window.dispatchEvent(new CustomEvent('privacyToggled', { detail: { active: false } }));

          }
          updateTimerUI();
        }, 1000);
      } else {
        clearInterval(state.timerInterval); state.timerInterval = null; state.privacySeconds = 900;
      }
      updateTimerUI();
      window.dispatchEvent(new CustomEvent('privacyToggled', { detail: { active: state.privacyActive } }));

    function updateTimerUI() {

      if (state.privacyActive) { t.classList.add('active'); b.classList.add('active'); }

      el('timerVal').textContent = `${m}:${s.toString().padStart(2, '0')}`;
      const pct = (state.privacySeconds / 900) * 100;

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }



    // ─── Real Document Processing ───
    async function downloadFakeFile(filename, customHtmlContent = null) {
      if (filename.toLowerCase().endsWith('.pdf')) {
        let pdfBytes;
        try {
          const { PDFDocument } = window.PDFLib;
          const pdfDoc = await PDFDocument.create();
          const page = pdfDoc.addPage();
          page.drawText(customHtmlContent ? "Documento Generado Exitosamente." : "Archivo procesado y generado por el motor QAXI PDFix.", { x: 50, y: page.getSize().height - 100, size: 24 });
          await applyAutoWatermark(pdfDoc);
          pdfBytes = await pdfDoc.save();
        } catch (e) {
          console.error(e);
          showToast("Error simulando la descarga.", "error");
          return;
        }
        const wblob = new Blob([pdfBytes], { type: 'application/pdf' });
        const wurl = URL.createObjectURL(wblob);
        const wa = document.createElement('a');
        wa.href = wurl;
        wa.download = filename;
        wa.click();
        URL.revokeObjectURL(wurl);
        return;
      }

      let textContent = "Resultado generado desde PDFix:\n\n";
      if (customHtmlContent) textContent += customHtmlContent.replace(/<[^>]*>?/gm, '');
      else textContent += "Este es un archivo resultante.";

      const ext = filename.split('.').pop().toLowerCase();
      let mime = 'text/plain';
      if (ext === 'docx') mime = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      if (ext === 'xlsx') mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
      if (ext === 'pptx') mime = 'application/vnd.openxmlformats-officedocument.presentationml.presentation';

      const blob = new Blob([textContent], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function simulateProcess(toolId, callback) {
      const btn = document.querySelector('.btn-primary');
      if (!btn) return;

      const originalText = btn.innerHTML;
      btn.disabled = true;

      const progressMsgs = {
        compress: ['Analizando streams de objetos...', 'Comprimiendo recursos...', 'Reduciendo calidad de imagen...', 'Optimizando estructura...'],
        repair: ['Escaneando corrupción de xref...', 'Reconstruyendo tabla de objetos...', 'Recuperando objetos huérfanos...', 'Validando integridad...'],
        protect: ['Incrustando marcas de seguridad...', 'Configurando permisos...', 'Cifrando metadatos simbólicos...', 'Verificando firma digital...'],
        ocr: ['Segmentando páginas...', 'Reconociendo caracteres (Tesseract)...', 'Analizando layout de texto...', 'Extrayendo bloques de contenido...'],
        default: ['Cargando documento...', 'Analizando estructura...', 'Aplicando cambios...', 'Finalizando proceso...']
      };
      const msgs = progressMsgs[toolId] || progressMsgs.default;

      // Crear barra de progreso real debajo del botón
      const progressWrap = document.createElement('div');
      progressWrap.style.cssText = 'width:100%; height:8px; background:rgba(255,255,255,0.05); border-radius:4px; margin-top:16px; overflow:hidden; position:relative;';
      const progressBar = document.createElement('div');
      progressBar.style.cssText = 'width:0%; height:100%; background:var(--red); transition:width 0.3s ease; box-shadow:0 0 10px var(--red-glow);';
      progressWrap.appendChild(progressBar);
      btn.parentNode.insertBefore(progressWrap, btn.nextSibling);

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 8;
        if (progress > 95) {
          clearInterval(interval);
        } else {
          const msg = msgs[Math.min(Math.floor(progress / 25), 3)];
          btn.innerHTML = `<span class="spinner"></span> ${msg} ${Math.round(progress)}%`;
          progressBar.style.width = progress + '%';
        }
      }, 150);

      async function finish() {
        try {
          // Log detallado para debugging profesional
          console.group(`[PDFix] Ejecutando: ${toolId}`);
          console.log(`Payload: ${state.files.length} archivo(s)`);

          await callback();

          btn.innerHTML = `${ICONS.Check} ¡Completado!`;
          progressBar.style.width = '100%';
          showToast("Proceso finalizado con éxito", "success");
          console.log("Estado: Éxito");
          console.groupEnd();

          setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            progressWrap.remove();
          }, 3000);
        } catch (e) {
          console.error(`[PDFix Error] Failla en ${toolId}:`, e);
          console.groupEnd();

          btn.innerHTML = `${ICONS.Rotate} Reintentar`;
          btn.disabled = false;
          progressBar.style.background = '#ef4444';

          let userMsg = "Error inesperado al procesar el PDF.";
          if (e.message?.includes('encrypted')) userMsg = "El PDF está protegido/cifrado y no puede procesarse.";
          if (e.message?.includes('corrupt')) userMsg = "El archivo PDF parece estar dañado.";
          if (e.message?.includes('Worker')) userMsg = "Error en el motor IA. Recarga la página.";

          showToast(userMsg, "error");
          setTimeout(() => progressWrap.remove(), 5000);
        }
      }

      // Iniciamos el proceso real en paralelo a la simulación visual
      setTimeout(finish, 2000 + Math.random() * 2000);
    }

    async function doExtractCSV() {
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const pdfLib2 = await initPdfJs();
      const pdf = await pdfLib2.getDocument({ data: ab }).promise;
      let csvContent = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const lines = {};
        textContent.items.forEach(item => {
          const y = Math.round(item.transform[5]);
          if (!lines[y]) lines[y] = [];
          lines[y].push(item.str);
        });
        const sortedKeys = Object.keys(lines).sort((a, b) => b - a);
        sortedKeys.forEach(key => { csvContent += lines[key].join(',') + '\n'; });
        if (i < pdf.numPages) csvContent += '\n';
      }
      if (!csvContent.trim()) csvContent = 'No se encontró texto extraíble en el PDF.';
      downloadTextFile(file.name.replace(/\.pdf$/i, '.csv'), csvContent);
    }

    async function doCreatePdf() {
      const { PDFDocument } = window.PDFLib;
      const pdfDoc = await PDFDocument.create();

      for (const file of state.files) {
        const type = file.type;
        if (type.startsWith('image/')) {
          const dataUrl = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const im = new Image();
              im.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = im.width;
                canvas.height = im.height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white'; // Fondo para imágenes transparentes como png, webp o svg
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(im, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.95)); // Convertimos universalmente a JPEG de alta calidad
              };
              im.onerror = reject;
              im.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
          const base64Data = dataUrl.split(',')[1];
          const binaryStr = atob(base64Data);
          const jpgBytes = new Uint8Array(binaryStr.length);
          for (let k = 0; k < binaryStr.length; k++) jpgBytes[k] = binaryStr.charCodeAt(k);
          const img = await pdfDoc.embedJpg(jpgBytes);

          const page = pdfDoc.addPage([img.width, img.height]);
          page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
        } else if (type === 'text/plain') {
          const text = await file.text();
          const page = pdfDoc.addPage();
          page.drawText(text, { x: 50, y: page.getSize().height - 50, size: 12 });
        }
      }

      await applyAutoWatermark(pdfDoc);
      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'exportado.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ─── Real Compression Engine (Resampling) ───
    async function doCompress() {
      const file = state.files[0];
      const originalSize = file.size;
      const ab = await file.arrayBuffer();

      const compLevel = document.getElementById('compLevel').value;
      let quality = 0.5; let scale = 0.9; // Medium default
      if (compLevel === 'extreme') { quality = 0.25; scale = 0.75; }
      if (compLevel === 'low') { quality = 0.85; scale = 1.0; }

      showToast("Iniciando compresión inteligente...", "info");

      try {
        const pdfjs = await initPdfJs();
        const loadingTask = pdfjs.getDocument({ data: ab });
        const pdf = await loadingTask.promise;
        const totalPages = pdf.numPages;

        const { PDFDocument } = window.PDFLib;
        const newDoc = await PDFDocument.create();

        for (let i = 1; i <= totalPages; i++) {
          showToast(`Optimizando página ${i}/${totalPages}...`, "info");
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          await page.render({ canvasContext: context, viewport: viewport }).promise;
          const imgData = canvas.toDataURL('image/jpeg', quality);
          const imgBytes = await fetch(imgData).then(res => res.arrayBuffer());
          const embeddedImg = await newDoc.embedJpg(imgBytes);
          const newDocPage = newDoc.addPage([embeddedImg.width, embeddedImg.height]);
          newDocPage.drawImage(embeddedImg, { x: 0, y: 0, width: embeddedImg.width, height: embeddedImg.height });

          // Clear canvas memory
          canvas.width = 0; canvas.height = 0;
        }

        await applyAutoWatermark(newDoc);
        const pdfBytes = await newDoc.save();
        const newSize = pdfBytes.length;
        const reduction = Math.round((1 - newSize / originalSize) * 100);

        const resultDiv = document.getElementById('compResult');
        resultDiv.innerHTML = `
          <div class="result-box">
            <div class="label">COMPRESIÓN REAL FINALIZADA</div>
            <div class="result-row">
              <div><div class="val old">${(originalSize / 1024).toFixed(1)} KB</div><div class="sub">Original</div></div>
              <div class="arrow">→</div>
              <div><div class="val new">${(newSize / 1024).toFixed(1)} KB</div><div class="sub">Final</div></div>
            </div>
            <div style="margin-top:12px;font-size:14px;color:var(--red);font-weight:700;">
              ${reduction > 0 ? `Peso reducido en un ${reduction}%` : 'El archivo ya estaba optimizado'}
            </div>
          </div>`;

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'comprimido.pdf';
        a.click(); URL.revokeObjectURL(url);
        showToast("PDF optimizado exitosamente", "success");
      } catch (e) {
        showToast("Error crítico en el motor: " + e.message, "error");
        console.error(e);
      }
    }

    async function initAdvEditor() {
      const file = state.files[0];

    window.changeAdvPage = function (dir) {
      if (!window._advPdfDoc) return;
      saveCurrentAdvDrawing();
      let newPage = window._advCurrentPage + dir;
      if (newPage < 1) newPage = 1;
      if (newPage > window._advTotalPages) newPage = window._advTotalPages;

    function saveCurrentAdvDrawing() {
      const fg = document.getElementById('psDrawCanvas');
      if (fg && window._advCurrentPage) {
        window._advDrawings[window._advCurrentPage] = fg.toDataURL('image/png');

    async function loadAdvPage(pageNum) {
      document.getElementById('advPageIndicator').textContent = `Página ${pageNum} de ${window._advTotalPages}`;
      const bg = document.getElementById('psCanvas');
      const fg = document.getElementById('psDrawCanvas');
      if (!bg || !fg || !window._advPdfDoc) return;

      const page = await window._advPdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 2.0 }); // High quality
      bg.width = viewport.width; bg.height = viewport.height;
      fg.width = viewport.width; fg.height = viewport.height;

      const ctx = bg.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;

      // Restore drawing for this page if exists
      window._advCtx = fg.getContext('2d');
      window._advCtx.clearRect(0, 0, fg.width, fg.height);
      if (window._advDrawings[pageNum]) {
        const img = new Image();
        img.onload = () => {
          window._advCtx.drawImage(img, 0, 0);
          setupAdvInteraction(fg);
        };
        img.src = window._advDrawings[pageNum];
      } else {
        setupAdvInteraction(fg);
      }

      renderAdvTextObjects();
    }

    function setupAdvInteraction(fg) {
      updateAdvBrush();
      window._advCtx.lineCap = 'round';
      window._advCtx.lineJoin = 'round';
      window._advMode = window._advMode || 'draw';

      // Detach old listeners to avoid duplicates
      fg.onmousedown = fg.ontouchstart = fg.onmousemove = fg.ontouchmove = fg.onmouseup = fg.onmouseleave = fg.ontouchend = null;

      let drawing = false;
      const getPos = (e) => {
        const r = fg.getBoundingClientRect();
        const scaleX = fg.width / r.width;
        const scaleY = fg.height / r.height;
        const t = e.touches?.[0];
        return {
          x: ((t?.clientX || e.clientX) - r.left) * scaleX,
          y: ((t?.clientY || e.clientY) - r.top) * scaleY
        }
      };
      fg.onmousedown = fg.ontouchstart = (e) => { e.preventDefault(); drawing = true; const { x, y } = getPos(e); window._advCtx.beginPath(); window._advCtx.moveTo(x, y) };
      fg.onmousemove = fg.ontouchmove = (e) => { if (!drawing) return; e.preventDefault(); const { x, y } = getPos(e); window._advCtx.lineTo(x, y); window._advCtx.stroke(); saveCurrentAdvDrawing(); };
      fg.onmouseup = fg.onmouseleave = fg.ontouchend = () => { drawing = false; saveCurrentAdvDrawing(); };
      if (window._advMode === 'erase') setAdvEraser(); else setAdvDraw();
    }

    function renderAdvTextObjects() {
      const wrap = document.getElementById('advCanvasWrap');
      if (!wrap) return;
      wrap.querySelectorAll('.adv-text-obj').forEach(el => el.remove());
      const pageTexts = window._advTextObjects[window._advCurrentPage] || [];
      pageTexts.forEach((obj, idx) => {
        const div = document.createElement('div');
        div.className = 'adv-text-obj';
        div.style.cssText = `position:absolute; left:${obj.xPct}%; top:${obj.yPct}%; transform:translate(-50%,-50%); cursor:move; font-size:${obj.size || 24}px; font-weight:bold; color:${obj.color || '#e11d48'}; font-family:Arial,sans-serif; z-index:20; padding:4px 8px; border:2px dashed transparent; border-radius:4px; white-space:nowrap; min-width:20px;`;
        div.textContent = obj.text;
        div.contentEditable = false;
        div.onmouseenter = () => { div.style.borderColor = 'rgba(255,51,102,0.5)'; };
        div.onmouseleave = () => { div.style.borderColor = 'transparent'; };

        let dragging = false, startX, startY, origLeft, origTop;
        const startDrag = (e) => {
          if (div.isContentEditable) return;
          e.preventDefault(); e.stopPropagation(); dragging = true;
          const t = e.touches?.[0];
          startX = t?.clientX || e.clientX; startY = t?.clientY || e.clientY;
          origLeft = obj.xPct; origTop = obj.yPct;
          div.style.borderColor = 'var(--red)';
        };
        const moveDrag = (e) => {
          if (!dragging) return; e.preventDefault();
          const t = e.touches?.[0];
          const cx = t?.clientX || e.clientX, cy = t?.clientY || e.clientY;
          const rect = wrap.getBoundingClientRect();
          const dx = ((cx - startX) / rect.width) * 100;
          const dy = ((cy - startY) / rect.height) * 100;
          obj.xPct = Math.max(0, Math.min(100, origLeft + dx));
          obj.yPct = Math.max(0, Math.min(100, origTop + dy));
          div.style.left = obj.xPct + '%';
          div.style.top = obj.yPct + '%';
        };
        const endDrag = () => { dragging = false; div.style.borderColor = 'transparent'; };

        div.onmousedown = div.ontouchstart = startDrag;

    async function doAdvancedEdit() {
      saveCurrentAdvDrawing(); // Ensure latest stroke is saved
      const { PDFDocument, rgb } = window.PDFLib;
      const ab = await state.files[0].arrayBuffer();
      const doc = await PDFDocument.load(ab);
      const pages = doc.getPages();

      // Hex to RGB helper
      const hexToRgb = hex => {
        let r = 0, g = 0, b = 0;
        if (hex.length == 4) { r = "0x" + hex[1] + hex[1]; g = "0x" + hex[2] + hex[2]; b = "0x" + hex[3] + hex[3]; }
        else if (hex.length == 7) { r = "0x" + hex[1] + hex[2]; g = "0x" + hex[3] + hex[4]; b = "0x" + hex[5] + hex[6]; }
        return rgb(r / 255, g / 255, b / 255);
      };

      for (let i = 0; i < pages.length; i++) {
        const pageNum = i + 1;
        const page = pages[i];
        const { width, height } = page.getSize();

        // Apply drawing if exists
        if (window._advDrawings[pageNum]) {
          const imgBase64 = window._advDrawings[pageNum];
          const img = await doc.embedPng(imgBase64);
          page.drawImage(img, { x: 0, y: 0, width: width, height: height });
        }

        // Apply text if exists
        const texts = window._advTextObjects[pageNum];
        if (texts && texts.length > 0) {
          texts.forEach(t => {
            const xVal = (t.xPct / 100) * width;
            const yVal = height - ((t.yPct / 100) * height); // PDF y-axis is bottom-up
            page.drawText(t.text, {
              x: xVal - ((t.text.length * (t.size * 0.3))), // approximate center offset
              y: yVal - (t.size * 0.3),
              size: t.size,
              color: hexToRgb(t.color)
            });
          });
        }
      }

      await applyAutoWatermark(doc);
      const pdfBytes = await doc.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'pdf_editado.pdf';

    }

    async function doCompare() {
      const pdfLib2 = await initPdfJs();
      async function renderFirstPage(file) {
        const ab = await file.arrayBuffer();
        const pdf = await pdfLib2.getDocument({ data: ab }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 1.5 });
        const cv = document.createElement('canvas');
        cv.width = vp.width; cv.height = vp.height;
        const cx = cv.getContext('2d');
        await page.render({ canvasContext: cx, viewport: vp }).promise;
        return { cv, cx, w: vp.width, h: vp.height };
      }
      const [r1, r2] = await Promise.all([renderFirstPage(state.files[0]), renderFirstPage(state.files[1])]);
      const w = Math.max(r1.w, r2.w), ht = Math.max(r1.h, r2.h);
      const diffCv = document.createElement('canvas'); diffCv.width = w; diffCv.height = ht;
      const dc = diffCv.getContext('2d');
      const d1 = r1.cx.getImageData(0, 0, r1.w, r1.h), d2 = r2.cx.getImageData(0, 0, r2.w, r2.h);
      const dd = dc.createImageData(w, ht);
      let diffPx = 0;
      for (let y = 0; y < ht; y++) for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;
        if (x < Math.min(r1.w, r2.w) && y < Math.min(r1.h, r2.h)) {
          const i1 = (y * r1.w + x) * 4, i2 = (y * r2.w + x) * 4;
          const diff = (Math.abs(d1.data[i1] - d2.data[i2]) + Math.abs(d1.data[i1 + 1] - d2.data[i2 + 1]) + Math.abs(d1.data[i1 + 2] - d2.data[i2 + 2])) / 3;
          if (diff > 20) { dd.data[idx] = 255; dd.data[idx + 1] = 50; dd.data[idx + 2] = 80; dd.data[idx + 3] = 200; diffPx++; }
          else { dd.data[idx] = d1.data[i1]; dd.data[idx + 1] = d1.data[i1 + 1]; dd.data[idx + 2] = d1.data[i1 + 2]; dd.data[idx + 3] = 80; }
        } else { dd.data[idx] = 255; dd.data[idx + 1] = 200; dd.data[idx + 2] = 0; dd.data[idx + 3] = 150; diffPx++; }
      }
      dc.putImageData(dd, 0, 0);
      const pct = ((diffPx / (w * ht)) * 100).toFixed(2);
      const tc = el('toolContent');
      const existingResult = document.getElementById('compareResultArea');
      if (existingResult) existingResult.remove();
      const resultDiv = document.createElement('div'); resultDiv.id = 'compareResultArea';
      resultDiv.innerHTML = `
          <div class="result-box" style="margin:16px 0">
            <div class="label">Resultado del análisis</div>
            <div style="margin-top:12px;font-size:20px;font-weight:700;color:var(--red)">${pct}% de diferencia detectada</div>
            <div style="font-size:12px;color:var(--text4);margin-top:4px">${diffPx.toLocaleString()} píxeles distintos</div>
          </div>
          <div style="border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#1a1a1a;text-align:center;padding:12px;margin-bottom:16px;">
            <p style="font-size:12px;color:var(--text4);margin-bottom:8px;">Las zonas rosas indican diferencias</p>
            <img src="${diffCv.toDataURL('image/png')}" style="max-width:100%;border-radius:8px;">
          </div>`;
      const compareBtn = document.getElementById('compareBtn');
      if (compareBtn && compareBtn.parentElement) {
        compareBtn.parentElement.insertBefore(resultDiv, compareBtn);
      } else if (tc) {
        tc.appendChild(resultDiv);
      }
    }

    async function doProtect() {
      const mode = window._protMode || 'protect';
      const file = state.files[0];
      const ab = await file.arrayBuffer();
      const inFilename = 'input.pdf';
      const outFilename = 'output.pdf';

      let qpdf;
      try {
        showToast("Inicializando motor de seguridad QPDF WASM...", "info");
        qpdf = await initQpdfModule();
      } catch (e) {
        showToast("Error cargando motor QPDF: " + e.message, "error");
        return;
      }

      try {
        const inputBuffer = new Uint8Array(ab);
        qpdf.FS.writeFile(inFilename, inputBuffer);
      } catch (e) {
        showToast("No se pudo cargar el archivo en el motor de cifrado.", "error");
        return;
      }

      if (mode === 'protect') {
        const pwInputs = document.querySelectorAll('#toolContent input[type="password"]');
        const userPw = pwInputs[0]?.value;
        const masterPw = pwInputs[1]?.value || userPw;
        if (!userPw) { throw new Error('Se requiere contraseña de usuario.'); }

        const qpdfArgs = [
          '--encrypt', userPw, masterPw, '256',
          '--', inFilename, outFilename
        ];

        try {
          showToast("Cifrando binario con AES-256...", "info");
          qpdf.callMain(qpdfArgs);
          const outData = qpdf.FS.readFile(outFilename);
          const blob = new Blob([outData], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'protegido_real.pdf';
          a.click(); URL.revokeObjectURL(url);
          showToast("PDF cifrado exitosamente", "success");
        } catch (e) {
          showToast("Fallo en el cifrado: el PDF podría tener restricciones previas.", "error");
        } finally {
          try { qpdf.FS.unlink(inFilename); } catch (e) { }
          try { qpdf.FS.unlink(outFilename); } catch (e) { }
        }
      } else {
        const pwInput = document.querySelector('#toolContent input[type="password"]');
        const pw = pwInput?.value;

        try {
          showToast("Intentando descifrado binario...", "info");
          const args = [];
          if (pw) args.push('--password=' + pw);
          args.push('--decrypt', inFilename, outFilename);

          qpdf.callMain(args);
          const outData = qpdf.FS.readFile(outFilename);
          const blob = new Blob([outData], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'desbloqueado_real.pdf';
          a.click(); URL.revokeObjectURL(url);
          showToast("Documento desbloqueado", "success");
        } catch (e) {
          showToast("Contraseña incorrecta o PDF no compatible.", "error");
        } finally {
          try { qpdf.FS.unlink(inFilename); } catch (e) { }
          try { qpdf.FS.unlink(outFilename); } catch (e) { }
        }
      }
    }

    async function doMergeOrSplit() {
      const { PDFDocument } = window.PDFLib;
      const mode = window._mergeMode || 'merge';
      let resultPdf;

      if (mode === 'merge') {
        resultPdf = await PDFDocument.create();
        for (let f of state.files) {
          if (!f.name.toLowerCase().endsWith('.pdf')) continue;
          const ab = await f.arrayBuffer();
          const doc = await PDFDocument.load(ab);
          const copied = await resultPdf.copyPages(doc, doc.getPageIndices());
          copied.forEach(p => resultPdf.addPage(p));
        }
      } else {
        const f = state.files[0];
        if (!f || !f.name.toLowerCase().endsWith('.pdf')) throw new Error("Sube un PDF para dividir");

        const ab = await f.arrayBuffer();
        const doc = await PDFDocument.load(ab);
        resultPdf = await PDFDocument.create();

        const inputEl = document.querySelector('#toolContent input');
        const inputStr = inputEl ? inputEl.value : '';
        let indices = [];

        if (inputStr.trim()) {
          const parts = inputStr.split(',');
          parts.forEach(p => {
            const r = p.split('-');
            if (r.length === 2) {
              for (let i = parseInt(r[0]); i <= parseInt(r[1]); i++) {
                if (i > 0 && i <= doc.getPageCount()) indices.push(i - 1);
              }
            } else {
              const v = parseInt(p);
              if (v > 0 && v <= doc.getPageCount()) indices.push(v - 1);
            }
          });
        } else {
          indices = doc.getPageIndices();
        }

        if (indices.length > 0) {
          const copied = await resultPdf.copyPages(doc, indices);
          copied.forEach(p => resultPdf.addPage(p));
        }
      }

      if (resultPdf && resultPdf.getPageCount() > 0) {
        await applyAutoWatermark(resultPdf);
        let pdfBytes = await resultPdf.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = mode === 'merge' ? 'unido.pdf' : 'dividido.pdf';
        a.click();
        URL.revokeObjectURL(url);
      } else {
        throw new Error("No se pudo procesar el PDF o no hay páginas válidas.");
      }
    }

    async function doOrganize() {
      const btn = document.getElementById('orgBtn');
      btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Guardando...`;
      try {
        const { PDFDocument, degrees } = window.PDFLib;
        const ab = await state.files[0].arrayBuffer();
        const doc = await PDFDocument.load(ab);
        const newPdf = await PDFDocument.create();

        const indicesToCopy = window._pages.map(p => p.origIdx);
        if (indicesToCopy.length > 0) {
          const copied = await newPdf.copyPages(doc, indicesToCopy);
          copied.forEach((p, i) => {
            const rot = window._pages[i].rot;
            if (rot !== 0) p.setRotation(degrees(p.getRotation().angle + rot));
            newPdf.addPage(p);
          });
          await applyAutoWatermark(newPdf);
          let pdfBytes = await newPdf.save();
          const blob = new Blob([pdfBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'organizado.pdf';
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);

    function rotatePage(i) { window._pages[i].rot = (window._pages[i].rot + 90) % 360; renderTool('organize'); }
    function deletePage(i) { window._pages.splice(i, 1); renderTool('organize'); }
    function pageDragOver(i) {
      if (window._dragIdx === null || window._dragIdx === i) return;
      const [item] = window._pages.splice(window._dragIdx, 1);
      window._pages.splice(i, 0, item);
      window._dragIdx = i;
      renderTool('organize');
    }
